<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VCK">
<title>VCK Alertas</title>
<style>
  :root {
    --bg: #080808;
    --s1: #111111;
    --s2: #191919;
    --s3: #222222;
    --gold: #F5C518;
    --white: #FFFFFF;
    --gray-1: #AAAAAA;
    --gray-2: #666666;
    --gray-3: #333333;
    --green: #22C55E;
    --red: #EF4444;
    --border: #252525;
    --nav-h: 64px;
    --safe-b: env(safe-area-inset-bottom, 0px);
    --safe-t: env(safe-area-inset-top, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100dvh;
    background: var(--bg);
    color: var(--white);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  /* ── SCROLL AREA ── */
  #main {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-top: calc(var(--safe-t) + 16px);
    padding-bottom: calc(var(--nav-h) + var(--safe-b) + 16px);
    padding-left: 16px;
    padding-right: 16px;
  }

  /* ── NAV ── */
  #nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: calc(var(--nav-h) + var(--safe-b));
    background: var(--s1);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    padding-top: 4px;
    z-index: 100;
  }

  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 8px 4px;
    background: none;
    border: none;
    color: var(--gray-2);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    min-height: 44px;
    transition: color 0.15s;
  }

  .nav-btn.active { color: var(--gold); }
  .nav-btn .nav-icon { font-size: 20px; line-height: 1; }

  /* ── HEADERS ── */
  .page-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 16px;
  }

  .page-subtitle {
    font-size: 13px;
    color: var(--gray-1);
    margin-bottom: 16px;
  }

  /* ── CARDS ── */
  .card {
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
  }

  /* ── STATS BAR ── */
  #stats-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }

  .stat-box {
    flex: 1;
    background: var(--s2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }

  .stat-lbl {
    font-size: 10px;
    color: var(--gray-1);
    margin-top: 2px;
    letter-spacing: 0.5px;
  }

  /* ── SEARCH ── */
  #search-wrap { margin-bottom: 14px; }

  .search-input {
    width: 100%;
    background: var(--s2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 16px;
    color: var(--white);
    outline: none;
  }

  .search-input::placeholder { color: var(--gray-2); }

  /* ── ALERT CARD ── */
  .alert-card {
    background: var(--s2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.15s;
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 44px;
  }

  .alert-card:active { border-color: var(--gold); }

  .alert-card-body { flex: 1; min-width: 0; }

  .alert-ref {
    font-size: 11px;
    color: var(--gray-1);
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 2px;
  }

  .alert-route {
    font-size: 16px;
    font-weight: 700;
    color: var(--white);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .alert-airline {
    font-size: 12px;
    color: var(--gray-1);
    margin-top: 2px;
  }

  .alert-card-right { text-align: right; flex-shrink: 0; }

  .alert-pix {
    font-size: 16px;
    font-weight: 700;
    color: var(--gold);
  }

  .badge {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-top: 3px;
  }

  .badge-intl { background: #1a2a4a; color: #60a5fa; }
  .badge-nac  { background: #1a3a2a; color: #4ade80; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray-2);
  }

  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-title { font-size: 18px; font-weight: 600; color: var(--gray-1); margin-bottom: 6px; }
  .empty-sub { font-size: 14px; }

  /* ── FORM ── */
  .form-section { margin-bottom: 20px; }

  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--gray-1);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .form-input {
    width: 100%;
    background: var(--s2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 16px;
    color: var(--white);
    outline: none;
    transition: border-color 0.15s;
  }

  .form-input:focus { border-color: var(--gold); }
  .form-input::placeholder { color: var(--gray-2); }

  .form-row {
    display: flex;
    gap: 10px;
  }

  .form-row .form-group { flex: 1; }

  .form-group { margin-bottom: 14px; }

  /* ── AIRLINE GRID ── */
  #airline-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }

  .airline-btn {
    background: var(--s2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 6px;
    font-size: 13px;
    font-weight: 700;
    color: var(--gray-1);
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    min-height: 44px;
  }

  .airline-btn.selected {
    border-color: var(--gold);
    color: var(--gold);
    background: #1a1600;
  }

  /* ── TYPE TOGGLE ── */
  .toggle-wrap {
    display: flex;
    background: var(--s2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .toggle-opt {
    flex: 1;
    padding: 11px 8px;
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    cursor: pointer;
    color: var(--gray-1);
    border: none;
    background: none;
    transition: all 0.15s;
    min-height: 44px;
  }

  .toggle-opt.active {
    background: var(--gold);
    color: #000;
  }

  /* ── CALC PREVIEW ── */
  #calc-preview {
    background: var(--s2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 14px;
  }

  #calc-preview .preview-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--gray-1);
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .calc-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .calc-row:last-child { border-bottom: none; }

  .calc-lbl { color: var(--gray-1); }
  .calc-val { font-weight: 700; }

  .calc-val.gold  { color: var(--gold); }
  .calc-val.green { color: var(--green); }
  .calc-val.red   { color: var(--red); }

  .profit-warn {
    background: #2a1a1a;
    border: 1px solid var(--red);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--red);
    margin-top: 10px;
    font-weight: 600;
  }

  /* ── BUTTONS ── */
  .btn {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    min-height: 50px;
    transition: opacity 0.15s;
    letter-spacing: 0.5px;
  }

  .btn:active { opacity: 0.8; }
  .btn-gold { background: var(--gold); color: #000; }
  .btn-red  { background: #2a1111; border: 1px solid var(--red); color: var(--red); }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--gray-1); }

  .btn-sm {
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    min-height: 36px;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .btn-sm.copied { background: var(--green) !important; color: #000 !important; }

  /* ── DETAIL ── */
  #back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--gold);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    padding: 0;
    margin-bottom: 16px;
    min-height: 44px;
  }

  .detail-header {
    background: var(--s2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }

  .detail-header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }

  .detail-ref {
    font-size: 11px;
    color: var(--gray-1);
    font-weight: 700;
    letter-spacing: 1px;
  }

  .detail-route {
    font-size: 22px;
    font-weight: 800;
    color: var(--white);
    margin: 4px 0;
  }

  .detail-airline { font-size: 13px; color: var(--gray-1); margin-bottom: 8px; }

  .detail-pix {
    font-size: 28px;
    font-weight: 800;
    color: var(--gold);
  }

  .detail-inst { font-size: 13px; color: var(--gray-1); margin-top: 2px; }

  .detail-edit-btn {
    background: var(--s3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--gold);
    font-size: 12px;
    font-weight: 700;
    padding: 6px 12px;
    cursor: pointer;
    min-height: 36px;
  }

  .financial-box {
    background: var(--s2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
  }

  .fin-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--gray-1);
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .fin-row {
    display: flex;
    justify-content: space-between;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .fin-row:last-child { border-bottom: none; }

  .copy-block {
    background: var(--s2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
  }

  .copy-block-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .copy-block-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--gray-1);
    letter-spacing: 1px;
  }

  .copy-text {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-size: 13px;
    color: var(--gray-1);
    white-space: pre-wrap;
    word-break: break-all;
    line-height: 1.6;
    max-height: 200px;
    overflow-y: auto;
  }

  .btn-link-full {
    display: block;
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    background: var(--gold);
    color: #000;
    text-align: center;
    text-decoration: none;
    margin-bottom: 12px;
    min-height: 50px;
    line-height: 20px;
  }

  /* ── BACKUP ── */
  .backup-card {
    background: var(--s2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }

  .backup-card-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 6px;
  }

  .backup-card-sub {
    font-size: 13px;
    color: var(--gray-1);
    margin-bottom: 14px;
  }

  #file-input { display: none; }

  .file-label {
    display: block;
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    border: 1.5px dashed var(--gray-3);
    text-align: center;
    font-size: 14px;
    font-weight: 600;
    color: var(--gray-1);
    cursor: pointer;
    min-height: 44px;
    transition: border-color 0.15s;
  }

  .file-label:active { border-color: var(--gold); }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: calc(var(--nav-h) + var(--safe-b) + 12px);
    left: 16px;
    right: 16px;
    background: var(--s3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 600;
    color: var(--white);
    text-align: center;
    z-index: 999;
    transform: translateY(0);
    opacity: 1;
    transition: opacity 0.3s;
    display: none;
  }

  #toast.visible { display: block; }
  #toast.hidden  { opacity: 0; }

  /* ── DIALOG ── */
  #dialog-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    display: none;
  }

  #dialog-overlay.visible { display: flex; }

  #dialog-box {
    width: 100%;
    background: var(--s1);
    border-top: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 20px 16px calc(var(--safe-b) + 20px);
  }

  .dialog-title {
    font-size: 17px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 6px;
  }

  .dialog-msg {
    font-size: 14px;
    color: var(--gray-1);
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .dialog-btns { display: flex; flex-direction: column; gap: 10px; }

  .dialog-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    min-height: 50px;
  }

  /* ── DIRECT TOGGLE ── */
  .switch-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .switch {
    position: relative;
    width: 44px;
    height: 26px;
    flex-shrink: 0;
  }

  .switch input { opacity: 0; width: 0; height: 0; }

  .slider {
    position: absolute;
    inset: 0;
    background: var(--s3);
    border-radius: 13px;
    border: 1px solid var(--border);
    transition: background 0.15s;
    cursor: pointer;
  }

  .slider::before {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    left: 2px;
    top: 2px;
    background: var(--gray-1);
    border-radius: 50%;
    transition: transform 0.15s, background 0.15s;
  }

  .switch input:checked + .slider { background: var(--gold); }
  .switch input:checked + .slider::before { transform: translateX(18px); background: #000; }

  .switch-label { font-size: 14px; color: var(--white); }

  /* ── HIDDEN ── */
  .hidden { display: none !important; }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 16px 0;
  }

  /* ── DATES CHIP ── */
  .dates-row {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    color: var(--gray-1);
    margin-top: 4px;
  }

  .dates-lbl { font-size: 11px; color: var(--gray-2); margin-bottom: 2px; }

  /* scroll-y for small screens */
  @media (max-height: 600px) {
    #main { padding-top: 10px; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="main"></div>
  <nav id="nav">
    <button class="nav-btn active" id="nb-list" onclick="setPage('list')">
      <span class="nav-icon">&#9741;</span>
      Buscar
    </button>
    <button class="nav-btn" id="nb-new" onclick="setPage('new')">
      <span class="nav-icon">+</span>
      Novo
    </button>
    <button class="nav-btn" id="nb-backup" onclick="setPage('backup')">
      <span class="nav-icon">&#8645;</span>
      Backup
    </button>
  </nav>
</div>

<div id="toast"></div>

<div id="dialog-overlay">
  <div id="dialog-box">
    <div class="dialog-title" id="dialog-title"></div>
    <div class="dialog-msg"  id="dialog-msg"></div>
    <div class="dialog-btns" id="dialog-btns"></div>
  </div>
</div>

<input type="file" id="file-input" accept=".json">

<script>
// ─────────────────────────────────────────────
// STORAGE
// ─────────────────────────────────────────────
const STORAGE_KEY  = 'vck_v3';
const COUNTER_KEY  = 'vck_ctr';

function loadAlerts() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}

function saveAlerts(arr) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
}

function getNextRef() {
  const now  = new Date();
  const dd   = String(now.getDate()).padStart(2, '0');
  const mm   = String(now.getMonth() + 1).padStart(2, '0');
  const today = dd + mm;

  let ctr = { d: today, n: 0 };
  try { ctr = JSON.parse(localStorage.getItem(COUNTER_KEY) || '{}'); } catch {}
  if (ctr.d !== today) { ctr = { d: today, n: 0 }; }
  ctr.n++;
  localStorage.setItem(COUNTER_KEY, JSON.stringify(ctr));
  return `${today}-${String(ctr.n).padStart(2, '0')}`;
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

// ─────────────────────────────────────────────
// RATES & CALC
// ─────────────────────────────────────────────
const LATAM_TIERS = [
  { max: 25000,  rate: 28.99 },
  { max: 50000,  rate: 27.49 },
  { max: 120000, rate: 26.99 },
  { max: Infinity, rate: 25.99 },
];

const SMILES_TIERS = [
  { max: 30000,  rate: 16.49 },
  { max: 70000,  rate: 15.99 },
  { max: Infinity, rate: 15.49 },
];

const INST_FEES = [
  null,   // 0 (placeholder)
  3.08,   // 1x
  5.55,   // 2x
  6.20,   // 3x
  6.91,   // 4x
  7.58,   // 5x
  8.26,   // 6x
  8.42,   // 7x
  9.16,   // 8x
  9.90,   // 9x
  10.45,  // 10x
];

const PROFIT_FLOOR = { intl: 200, nac: 100 };

function getRatePerMilheiro(airline, miles, customRate) {
  if (airline === 'LATAM') {
    return LATAM_TIERS.find(t => miles <= t.max).rate;
  }
  if (airline === 'SMILES' || airline === 'GOL') {
    return SMILES_TIERS.find(t => miles <= t.max).rate;
  }
  return customRate || 0;
}

function calcAlert(airline, miles, taxes, mktPrice, pixOverride, type, customRate) {
  const ratePerMilheiro = getRatePerMilheiro(airline, miles, customRate);
  const milesCost = (miles / 1000) * ratePerMilheiro;
  const totalCost = milesCost + taxes;
  const floor = PROFIT_FLOOR[type] || 100;
  const minPix = totalCost + floor;
  const finalPix = (pixOverride > 0) ? pixOverride : minPix;
  const profit = finalPix - totalCost;
  const maxInst = finalPix >= 1000 ? 10 : 5;
  const economy = mktPrice - finalPix;

  const installments = [];
  for (let n = 1; n <= maxInst; n++) {
    const fee = INST_FEES[n];
    const total = finalPix * (1 + fee / 100);
    installments.push({ n, total, per: total / n, fee });
  }

  return { ratePerMilheiro, milesCost, totalCost, minPix, finalPix, profit, maxInst, economy, installments, floor };
}

// ─────────────────────────────────────────────
// FORMAT
// ─────────────────────────────────────────────
function brl(v) {
  return 'R$ ' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function brlFloor(v) {
  return 'R$ ' + Math.floor(v).toLocaleString('pt-BR');
}

function airlineName(a) {
  const n = { LATAM: 'LATAM', SMILES: 'SMILES', GOL: 'GOL', AZUL: 'AZUL', TAP: 'TAP', OUTRO: '' };
  return n[a] !== undefined ? n[a] : a;
}

function sanitizeLink(raw) {
  if (!raw) return '';
  const m = raw.match(/href=["']?([^"'\s>]+)/i);
  if (m) return m[1];
  if (raw.startsWith('http')) return raw.trim();
  return raw.trim();
}

// ─────────────────────────────────────────────
// WHATSAPP COPY
// ─────────────────────────────────────────────
function buildWhatsApp(alert) {
  const c = calcAlert(alert.airline, alert.miles, alert.taxes, alert.mkt, alert.pix, alert.type, alert.rate);
  const pix = alert.pix || c.minPix;
  const maxInst = pix >= 1000 ? 10 : 5;
  const instFee = INST_FEES[maxInst];
  const instTotal = pix * (1 + instFee / 100);
  const perInst = instTotal / maxInst;
  const economy = alert.mkt - pix;

  const aName = (alert.airline === 'OUTRO' || alert.airline === 'AZUL' || alert.airline === 'TAP')
    ? (alert.airname || airlineName(alert.airline))
    : airlineName(alert.airline);

  let txt = `✈️ ${alert.origin} ⇄ ${alert.dest} por ${brlFloor(pix)}?`;
  if (alert.direct) txt += `\n✈️ Voo Direto`;
  txt += `\n\n${alert.origin} ➡️ ${alert.dest} ${alert.flag || ''}`;
  txt += `\n\n🏢 ${aName}`;
  txt += `\n\n💰 ${brl(pix)} via Pix`;
  txt += `\n💳 ${maxInst}x de ${brl(perInst)} no cartão`;
  txt += `\n\nCompanhia aérea: ${brl(alert.mkt)}`;
  txt += `\nComigo você paga: ${brl(pix)}`;
  txt += `\nSua economia real: ${brl(economy)}`;
  txt += `\n\n✅ Incluso: emissão, suporte completo até o embarque e suporte jurídico.`;
  txt += `\n\n📅 Ida: ${alert.dOut || '—'}`;
  txt += `\n📅 Volta: ${alert.dIn || '—'}`;
  txt += `\n\n👉 PARA EMITIR: Encaminhe esta mensagem no privado informando a data de ida, volta e a quantidade de passageiros.`;
  txt += `\n\n⚠️ Preço real com taxas. Sujeito a disponibilidade da malha aérea.`;
  txt += `\n\nRef: ${alert.ref}`;
  txt += `\nVOECOMKENNEDY ®️`;
  return txt;
}

// ─────────────────────────────────────────────
// HTML CARD COPY
// ─────────────────────────────────────────────
function buildHtmlCard(alert) {
  const link = sanitizeLink(alert.link) || '#';
  return `<div class="card" data-ref="${alert.ref}"><div class="info"><span class="ref">REF: ${alert.ref}</span><p class="dest">${alert.origin} ⇄ ${alert.dest}</p></div><a href="${link}" target="_blank" class="btn-link">ABRIR CIA</a></div>`;
}

// ─────────────────────────────────────────────
// CLIPBOARD
// ─────────────────────────────────────────────
function copyText(text, btn) {
  const orig = btn.textContent;
  const doSuccess = () => {
    btn.textContent = 'Copiado!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = orig;
      btn.classList.remove('copied');
    }, 2000);
  };

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(doSuccess).catch(() => fallbackCopy(text, doSuccess));
  } else {
    fallbackCopy(text, doSuccess);
  }
}

function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); cb(); } catch {}
  document.body.removeChild(ta);
}

// ─────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  t.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    t.classList.add('hidden');
    setTimeout(() => t.classList.remove('visible'), 300);
  }, 2500);
}

// ─────────────────────────────────────────────
// DIALOG
// ─────────────────────────────────────────────
function showDialog(title, msg, buttons) {
  document.getElementById('dialog-title').textContent = title;
  document.getElementById('dialog-msg').textContent   = msg;
  const btnsEl = document.getElementById('dialog-btns');
  btnsEl.innerHTML = '';
  buttons.forEach(b => {
    const el = document.createElement('button');
    el.className = 'dialog-btn ' + (b.cls || 'btn-ghost');
    el.textContent = b.label;
    el.onclick = () => {
      closeDialog();
      b.action && b.action();
    };
    btnsEl.appendChild(el);
  });
  document.getElementById('dialog-overlay').classList.add('visible');
}

function closeDialog() {
  document.getElementById('dialog-overlay').classList.remove('visible');
}

document.getElementById('dialog-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeDialog();
});

function renderAlertList() {
  const alerts = loadAlerts();
  const q = searchQuery.toLowerCase().trim();
  const filtered = q ? alerts.filter(a => {
    return (a.ref || '').toLowerCase().includes(q)
      || (a.origin || '').toLowerCase().includes(q)
      || (a.dest || '').toLowerCase().includes(q)
      || (a.airline || '').toLowerCase().includes(q)
      || (a.airname || '').toLowerCase().includes(q);
  }) : alerts;

  const el = document.getElementById('alert-list');
  if (!el) return;

  if (filtered.length === 0) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">&#9741;</div>
      <div class="empty-title">${alerts.length === 0 ? 'Nenhum alerta' : 'Sem resultados'}</div>

    </div>`;
    return;
  }

  // Sort by ts desc
  const sorted = [...filtered].sort((a, b) => (b.ts || 0) - (a.ts || 0));

  el.innerHTML = sorted.map(a => {
    const pix = a.pix || 0;
    const typeClass = a.type === 'intl' ? 'badge-intl' : 'badge-nac';
    const typeLbl   = a.type === 'intl' ? 'INTL' : 'NAC';
    const aName = (a.airline === 'OUTRO' || a.airline === 'AZUL' || a.airline === 'TAP') && a.airname
      ? a.airname : airlineName(a.airline);

    return `<div class="alert-card" onclick="openDetail('${a.id}')">
      <div class="alert-card-body">
        <div class="alert-ref">REF: ${a.ref}</div>
        <div class="alert-route">${a.origin || '?'} ⇄ ${a.dest || '?'} ${a.flag || ''}</div>
        <div class="alert-airline">${aName}</div>
      </div>
      <div class="alert-card-right">
        <div class="alert-pix">${brlFloor(pix)}</div>
        <span class="badge ${typeClass}">${typeLbl}</span>
      </div>

  }).join('');
}

      fType    = a.type;

      // Now fill values
      setVal('f-origin', a.origin);
      setVal('f-dest',   a.dest);
      setVal('f-flag',   a.flag);
      setVal('f-miles',  a.miles);
      setVal('f-taxes',  a.taxes);

      setVal('f-din',    a.dIn);
      setVal('f-link',   a.link);

  if (!el) return 0;
  const v = parseFloat(el.value);
  return isNaN(v) ? 0 : v;
}

function updateCalc() {
  const miles  = getNum('f-miles');
  const taxes  = getNum('f-taxes');
  const mkt    = getNum('f-mkt');
  const pixIn  = getNum('f-pix');
  const rate   = getNum('f-rate');

  const el = document.getElementById('calc-rows');
  if (!el) return;

  if (miles <= 0) {
    el.innerHTML = '<div style="color:var(--gray-2);font-size:13px">Preencha milhas e taxas para calcular.</div>';
    return;
  }

  const c = calcAlert(fAirline, miles, taxes, mkt, pixIn, fType, rate);

  const profitOk = c.profit >= c.floor;

  el.innerHTML = `
    <div class="calc-row">
      <span class="calc-lbl">Custo milhas</span>
      <span class="calc-val">${brl(c.milesCost)}</span>
    </div>
    <div class="calc-row">
      <span class="calc-lbl">Custo total</span>
      <span class="calc-val">${brl(c.totalCost)}</span>
    </div>
    <div class="calc-row">
      <span class="calc-lbl">Minimo Pix</span>
      <span class="calc-val gold">${brl(c.minPix)}</span>
    </div>
    <div class="calc-row">
      <span class="calc-lbl">Pix final</span>
      <span class="calc-val gold">${brl(c.finalPix)}</span>
    </div>
    <div class="calc-row">
      <span class="calc-lbl">Lucro</span>
      <span class="calc-val ${profitOk ? 'green' : 'red'}">${brl(c.profit)}</span>
    </div>
    <div class="calc-row">
      <span class="calc-lbl">Max parcelas</span>
      <span class="calc-val">${c.maxInst}x</span>
    </div>
    <div class="calc-row">
      <span class="calc-lbl">Parcelamento ${c.maxInst}x</span>
      <span class="calc-val">${brl(c.installments[c.maxInst-1].per)}/x</span>
    </div>
    ${mkt > 0 ? `<div class="calc-row">
      <span class="calc-lbl">Economia cliente</span>
      <span class="calc-val green">${brl(mkt - c.finalPix)}</span>
    </div>` : ''}
    ${!profitOk ? `<div class="profit-warn">Atencao: lucro abaixo do minimo de ${brl(c.floor)} para ${fType === 'intl' ? 'internacional' : 'nacional'}.</div>` : ''}
  `;
}

function saveForm() {
  const origin = (document.getElementById('f-origin')?.value || '').trim();
  const dest   = (document.getElementById('f-dest')?.value   || '').trim();
  const miles  = getNum('f-miles');
  const taxes  = getNum('f-taxes');
  const mkt    = getNum('f-mkt');
  const pixIn  = getNum('f-pix');
  const rate   = getNum('f-rate');

  if (!origin || !dest) { showToast('Preencha origem e destino'); return; }
  if (miles <= 0)       { showToast('Preencha as milhas');        return; }

  const c = calcAlert(fAirline, miles, taxes, mkt, pixIn, fType, rate);
  const finalPix = pixIn > 0 ? pixIn : c.minPix;

  const airname = (document.getElementById('f-airname')?.value || '').trim();
  const direct  = document.getElementById('f-direct')?.checked || false;
  const flag    = (document.getElementById('f-flag')?.value || '').trim();
  const dOut    = (document.getElementById('f-dout')?.value || '').trim();
  const dIn     = (document.getElementById('f-din')?.value  || '').trim();
  const link    = sanitizeLink(document.getElementById('f-link')?.value || '');

  const alerts = loadAlerts();

  if (editingId) {
    const idx = alerts.findIndex(a => a.id === editingId);
    if (idx >= 0) {
      alerts[idx] = {
        ...alerts[idx],
        airline: fAirline,
        airname,
        rate,
        type: fType,
        origin,
        dest,
        flag,
        miles,
        taxes,
        mkt,
        pix: finalPix,
        direct,
        dOut,
        dIn,
        link,
      };
      saveAlerts(alerts);
      showToast('Alerta atualizado');
      editingId = null;
      currentPage = 'list';
      fAirline = 'LATAM';
      fType = 'intl';
      ['list','new','backup'].forEach(x => {
        document.getElementById('nb-' + x).classList.toggle('active', x === 'list');
      });
      render();
      setTimeout(() => { renderAlertList(); }, 0);
    }
  } else {
    const ref = getNextRef();
    const newAlert = {
      id:      genId(),
      ref,
      airline: fAirline,
      airname,
      rate,
      type:    fType,
      origin,
      dest,
      flag,
      miles,
      taxes,
      mkt,
      pix:     finalPix,
      direct,
      dOut,
      dIn,
      link,
      ts:      Date.now(),
    };
    alerts.push(newAlert);
    saveAlerts(alerts);
    showToast(`Alerta ${ref} criado!`);
    fAirline = 'LATAM';
    fType = 'intl';
    setPage('list');
    setTimeout(() => { renderAlertList(); }, 0);
  }
}

function cancelForm() {
  editingId = null;
  fAirline = 'LATAM';
  fType = 'intl';
  if (currentDetail) {
    render();
  } else {
    setPage('list');
    setTimeout(() => renderAlertList(), 0);
  }
}

// ─────────────────────────────────────────────
// BACKUP PAGE
// ─────────────────────────────────────────────
function renderBackup() {
  const alerts = loadAlerts();
  return `
    <div class="page-title">Backup</div>

    <div class="backup-card">
      <div class="backup-card-title">Exportar dados</div>
      <div class="backup-card-sub">${alerts.length} alerta${alerts.length !== 1 ? 's' : ''} salvos</div>
      <button class="btn btn-gold" onclick="exportData()">Exportar JSON</button>
    </div>

    <div class="backup-card">
      <div class="backup-card-title">Importar dados</div>
      <div class="backup-card-sub">Selecione um arquivo .json exportado anteriormente</div>
      <label for="file-input" class="file-label">Selecionar arquivo .json</label>
    </div>

    <div class="backup-card">
      <div class="backup-card-title">Limpar dados</div>
      <div class="backup-card-sub">Remove todos os alertas permanentemente</div>
      <button class="btn btn-red" onclick="confirmClearAll()">Limpar tudo</button>
    </div>
  `;
}

function initBackup() {
  const fi = document.getElementById('file-input');
  fi.value = '';
  fi.addEventListener('change', handleFileImport);
}

function exportData() {
  const alerts = loadAlerts();
  const data = {
    version: 3,
    at: new Date().toISOString(),
    alerts,
  };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const filename = `vck-alertas-${new Date().toISOString().slice(0,10)}.json`;

  if (navigator.share && navigator.canShare) {
    try {
      const file = new File([blob], filename, { type: 'application/json' });
      if (navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file], title: 'VCK Alertas' }).catch(() => downloadFile(url, filename));
        return;
      }
    } catch {}
  }
  downloadFile(url, filename);
}

function downloadFile(url, filename) {
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Exportado!');
}

function handleFileImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      const incoming = extractAlerts(data);
      if (!incoming.length) { showToast('Nenhum alerta encontrado'); return; }
      showDialog(
        'Importar dados',
        `${incoming.length} alerta${incoming.length !== 1 ? 's' : ''} encontrado${incoming.length !== 1 ? 's' : ''}. Como deseja importar?`,
        [
          { label: 'Substituir tudo', cls: 'btn-red',   action: () => importReplace(incoming) },
          { label: 'Mesclar',         cls: 'btn-gold',  action: () => importMerge(incoming)   },
          { label: 'Cancelar',        cls: 'btn-ghost'  },
        ]
      );
    } catch {
      showToast('Arquivo invalido');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function extractAlerts(data) {
  // v3 format
  if (Array.isArray(data.alerts)) {
    return data.alerts.map(migrateAlert);
  }
  // Array directly
  if (Array.isArray(data)) {
    return data.map(migrateAlert);
  }
  return [];
}

function migrateAlert(a) {
  // Old format: has 'dest' but no 'origin'
  if (a.dest && !a.origin) {
    return {
      ...a,
      origin: a.from || '',
      dest:   a.dest,
      id:     a.id || genId(),
      ts:     a.ts || Date.now(),
    };
  }
  return { id: genId(), ts: Date.now(), ...a };
}

function importReplace(alerts) {
  saveAlerts(alerts);
  showToast(`${alerts.length} alertas importados`);
  render();
}

function importMerge(incoming) {
  const existing = loadAlerts();
  const existIds = new Set(existing.map(a => a.id));
  const toAdd = incoming.filter(a => !existIds.has(a.id));
  saveAlerts([...existing, ...toAdd]);
  showToast(`${toAdd.length} alertas mesclados`);
  render();
}

function confirmClearAll() {
  showDialog(
    'Limpar todos os dados',
    'Isso vai apagar TODOS os alertas permanentemente. Nao ha como desfazer.',
    [
      { label: 'Apagar tudo', cls: 'btn-red', action: clearAll },
      { label: 'Cancelar',    cls: 'btn-ghost' },
    ]
  );
}

function clearAll() {
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(COUNTER_KEY);
  showToast('Dados apagados');
  render();
}

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  render();
  // Render alert list after list page is painted
  setTimeout(() => {
    if (currentPage === 'list' && !currentDetail) {
      const inp = document.getElementById('search-input');
      if (inp) {
        inp.addEventListener('input', e => {
          searchQuery = e.target.value;
          renderAlertList();
        });
      }
      renderAlertList();
    }
  }, 0);
});
</script>
