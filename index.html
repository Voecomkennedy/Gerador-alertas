<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VCK">
<title>VCK Alertas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap');

  :root {
    --bg:        #0B1120;
    --s1:        #131C2F;
    --s2:        #1A2540;
    --s3:        #0D1524;
    --gold:      #D4A843;
    --gold-light:#E8C96A;
    --gold-dim:  rgba(212,168,67,0.10);
    --gold-glow: rgba(212,168,67,0.18);
    --gold-line: rgba(212,168,67,0.28);
    --white:     #EEF2FA;
    --gray-1:    #7D8FAD;
    --gray-2:    #4A5A78;
    --gray-3:    #253045;
    --green:     #10D07A;
    --red:       #EF5350;
    --border:    rgba(255,255,255,0.06);
    --border-hi: rgba(212,168,67,0.40);
    --navy:      #080F1C;
    --nav-h:     64px;
    --safe-b:    env(safe-area-inset-bottom, 0px);
    --safe-t:    env(safe-area-inset-top, 0px);
    --radius:    14px;
    --radius-sm: 10px;
    --shadow:    0 4px 24px rgba(0,0,0,0.45);
    --shadow-sm: 0 2px 10px rgba(0,0,0,0.30);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100dvh;
    background: var(--bg);
    color: var(--white);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  #app { display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }

  /* ── APP HEADER ── */
  #app-header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: calc(var(--safe-t) + 12px) 20px 12px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    z-index: 50;
  }
  .hdr-brand { display: flex; align-items: baseline; gap: 8px; }
  .hdr-logo {
    font-size: 20px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: -1px;
    line-height: 1;
  }
  .hdr-wordmark {
    font-size: 12px;
    font-weight: 700;
    color: var(--gray-2);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  #hdr-right { display: flex; align-items: center; gap: 10px; }
  .hdr-count {
    font-size: 11px;
    font-weight: 700;
    color: var(--gray-1);
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    letter-spacing: 0.5px;
  }

  /* ── SCROLL AREA ── */
  #main {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-top: 20px;
    padding-bottom: calc(90px + var(--safe-b));
    padding-left: 16px;
    padding-right: 16px;
  }
  #main::-webkit-scrollbar { width: 2px; }
  #main::-webkit-scrollbar-track { background: transparent; }
  #main::-webkit-scrollbar-thumb { background: var(--gold-line); border-radius: 2px; }

  /* ── FLOATING PILL NAV ── */
  #nav {
    position: fixed;
    bottom: calc(var(--safe-b) + 14px);
    left: 14px;
    right: 14px;
    height: auto;
    background: rgba(19,28,47,0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 26px;
    display: flex;
    align-items: center;
    padding: 6px;
    gap: 4px;
    z-index: 100;
    box-shadow: 0 16px 48px rgba(0,0,0,0.65), 0 0 0 1px rgba(212,168,67,0.06);
  }

  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 8px 4px;
    background: none;
    border: none;
    color: var(--gray-2);
    cursor: pointer;
    border-radius: 20px;
    transition: all 0.2s;
    min-height: 52px;
    font-family: inherit;
  }
  .nav-btn.active {
    background: var(--gold-dim);
    color: var(--gold);
    box-shadow: inset 0 0 0 1px var(--gold-line);
  }
  .nav-icon { font-size: 18px; line-height: 1; }
  .nav-lbl  { font-size: 9px; font-weight: 800; letter-spacing: 0.8px; text-transform: uppercase; }

  .nav-btn-new .nav-new-plus {
    font-size: 22px;
    font-weight: 300;
    line-height: 1;
    color: var(--gold);
  }
  .nav-btn-new.active .nav-new-plus { color: var(--gold); }

  /* ── PAGE TITLE ── */
  .page-title {
    font-size: 20px;
    font-weight: 800;
    color: var(--white);
    margin-bottom: 18px;
    letter-spacing: -0.4px;
    line-height: 1.1;
  }
  .page-subtitle { font-size: 13px; color: var(--gray-1); margin-bottom: 16px; line-height: 1.5; }

  /* ── CARDS (generic) ── */
  .card {
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }

  /* ── KPI BAR ── */
  .kpi-bar {
    display: flex;
    align-items: stretch;
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
    position: relative;
  }
  .kpi-bar::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, var(--gold) 0%, transparent 60%);
  }
  .kpi-main {
    flex: 1;
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .kpi-main-num {
    font-size: 48px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: -3px;
    line-height: 1;
  }
  .kpi-main-lbl {
    font-size: 10px;
    font-weight: 700;
    color: var(--gray-1);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .kpi-pills {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
    padding: 16px 16px 16px 0;
    border-left: 1px solid var(--border);
    padding-left: 16px;
  }
  .kpi-pill {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--s3);
    border-radius: 10px;
    padding: 8px 12px;
    min-width: 100px;
  }
  .kpi-pill-num {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.8px;
    line-height: 1;
  }
  .kpi-pill-lbl {
    font-size: 9px;
    font-weight: 800;
    color: var(--gray-1);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .kpi-intl .kpi-pill-num { color: #60A5FA; }
  .kpi-nac  .kpi-pill-num { color: #34D399; }

  /* ── SEARCH PILL ── */
  #search-wrap { margin-bottom: 16px; }
  .search-pill {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 0 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-pill:focus-within { border-color: var(--border-hi); box-shadow: 0 0 0 3px var(--gold-dim); }
  .search-pill-icon { font-size: 16px; color: var(--gray-2); flex-shrink: 0; }
  .search-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    padding: 13px 0;
    font-size: 15px;
    color: var(--white);
    font-family: inherit;
  }
  .search-input::placeholder { color: var(--gray-2); }

  /* ── FLIGHT CARD (new alert card) ── */
  .flight-card {
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
    overflow: hidden;
  }
  .flight-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--gold);
    opacity: 0.7;
    border-radius: 0 2px 2px 0;
  }
  .flight-card:hover  { background: var(--s2); border-color: var(--border-hi); transform: translateY(-1px); box-shadow: 0 8px 28px rgba(0,0,0,0.4); }
  .flight-card:active { background: var(--s3); transform: scale(0.99); }

  .fc-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .fc-airline {
    font-size: 10px;
    font-weight: 800;
    color: var(--gray-1);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .fc-meta { display: flex; align-items: center; gap: 8px; }
  .fc-ref  { font-size: 10px; color: var(--gray-2); font-weight: 600; letter-spacing: 0.5px; }

  .fc-route {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 4px;
  }
  .fc-city {
    font-size: 24px;
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.8px;
    line-height: 1;
  }
  .fc-arrow {
    font-size: 16px;
    color: var(--gold);
    opacity: 0.6;
    flex-shrink: 0;
  }
  .fc-flag { font-size: 18px; }
  .fc-direct {
    font-size: 9px;
    font-weight: 800;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 2px;
    opacity: 0.85;
  }
  .fc-bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .fc-price {
    font-size: 26px;
    font-weight: 800;
    color: var(--gold);
    letter-spacing: -1px;
    line-height: 1;
  }
  .fc-price-label {
    font-size: 10px;
    color: var(--gray-2);
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }
  .fc-time { font-size: 11px; color: var(--gray-2); font-weight: 500; }

  /* ── PACKAGE CARD ── */
  .pkg-card {
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
    overflow: hidden;
  }
  .pkg-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: #60A5FA;
    opacity: 0.7;
    border-radius: 0 2px 2px 0;
  }
  .pkg-card:hover { background: var(--s2); border-color: rgba(96,165,250,0.4); transform: translateY(-1px); box-shadow: 0 8px 28px rgba(0,0,0,0.4); }
  .pkg-card:active { background: var(--s3); transform: scale(0.99); }
  .pkg-card-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .pkg-card-forn { font-size: 10px; font-weight: 800; color: var(--gray-1); letter-spacing: 2px; text-transform: uppercase; }
  .pkg-card-ref  { font-size: 10px; color: var(--gray-2); font-weight: 600; }
  .pkg-card-dest { font-size: 22px; font-weight: 800; color: var(--white); letter-spacing: -0.6px; line-height: 1; margin-bottom: 4px; }
  .pkg-card-sub  { font-size: 12px; color: var(--gray-1); }
  .pkg-card-bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .pkg-card-price { font-size: 24px; font-weight: 800; color: var(--gold); letter-spacing: -0.8px; line-height: 1; }
  .pkg-card-badge { background: rgba(96,165,250,0.14); color: #60A5FA; border: 1px solid rgba(96,165,250,0.22); border-radius: 4px; font-size: 9px; font-weight: 800; padding: 3px 8px; letter-spacing: 1px; }

  /* ── BADGES ── */
  .badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  .badge-intl { background: rgba(59,130,246,0.14); color: #60A5FA; border: 1px solid rgba(59,130,246,0.22); }
  .badge-nac  { background: rgba(16,208,122,0.12); color: #34D399; border: 1px solid rgba(16,208,122,0.22); }

  /* ── keep legacy alert-card/alert-pix for detail page ── */
  .alert-ref  { font-size: 10px; color: var(--gray-1); font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
  .alert-ts   { font-size: 10px; font-weight: 400; letter-spacing: 0; color: var(--gray-2); text-transform: none; }
  .alert-card-body { flex: 1; min-width: 0; }
  .alert-card-right { text-align: right; flex-shrink: 0; }
  .alert-pix  { font-size: 16px; font-weight: 800; color: var(--gold); letter-spacing: -0.4px; }

  /* ── EMPTY STATE ── */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--gray-2); }
  .empty-icon  { font-size: 48px; margin-bottom: 14px; opacity: 0.5; }
  .empty-title { font-size: 17px; font-weight: 700; color: var(--gray-1); margin-bottom: 8px; }
  .empty-sub   { font-size: 14px; line-height: 1.5; }

  /* ── FORM ── */
  .form-section { margin-bottom: 20px; }
  .form-label {
    display: block;
    font-size: 10px;
    font-weight: 800;
    color: var(--gray-1);
    letter-spacing: 1.4px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .form-input {
    width: 100%;
    background: var(--s3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 13px 14px;
    font-size: 16px;
    color: var(--white);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    font-family: inherit;
  }
  .form-input:focus { border-color: var(--border-hi); box-shadow: 0 0 0 3px var(--gold-dim); background: var(--s1); }
  .form-input::placeholder { color: var(--gray-2); }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5) sepia(1) hue-rotate(5deg); cursor: pointer; }
  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }
  .form-group { margin-bottom: 14px; }

  /* ── AIRLINE / SELECTOR GRID ── */
  #airline-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }
  .airline-btn {
    background: var(--s3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 6px;
    font-size: 12px;
    font-weight: 800;
    color: var(--gray-1);
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    min-height: 44px;
    letter-spacing: 0.5px;
    font-family: inherit;
  }
  .airline-btn:hover { border-color: var(--gold-line); color: var(--white); }
  .airline-btn.selected {
    border-color: var(--gold);
    color: var(--gold);
    background: var(--gold-dim);
    box-shadow: inset 0 0 0 1px var(--gold-line);
  }

  /* ── REGION GRID ── */
  #regiao-grid, #pkg-regiao-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 14px;
  }
  .regiao-btn {
    flex: 1 1 auto;
    min-width: 80px;
    background: var(--s3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 8px;
    font-size: 11px;
    font-weight: 800;
    color: var(--gray-1);
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    min-height: 40px;
    letter-spacing: 0.6px;
    font-family: inherit;
    text-transform: uppercase;
  }
  .regiao-btn:hover { border-color: var(--gold-line); color: var(--white); }
  .regiao-btn.selected {
    border-color: var(--gold);
    color: var(--gold);
    background: var(--gold-dim);
    box-shadow: inset 0 0 0 1px var(--gold-line);
  }
  /* Filter pills na lista */
  .regiao-filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 14px;
  }
  .regiao-filter-pill {
    padding: 7px 14px;
    border-radius: 999px;
    background: var(--s3);
    border: 1px solid var(--border);
    color: var(--gray-1);
    font-size: 11px;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    transition: all 0.15s;
    font-family: inherit;
  }
  .regiao-filter-pill:hover { border-color: var(--gold-line); color: var(--white); }
  .regiao-filter-pill.active {
    border-color: var(--gold);
    color: var(--gold);
    background: var(--gold-dim);
  }
  /* Chip de agendamento no card */
  .mini-chip.sched {
    color: #a78bfa;
    border-color: rgba(167,139,250,0.28);
    background: rgba(167,139,250,0.10);
  }

  /* ── TOGGLE PILL ── */
  .toggle-wrap {
    display: flex;
    background: var(--s3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    padding: 3px;
    gap: 3px;
  }
  .toggle-opt {
    flex: 1;
    padding: 10px 8px;
    font-size: 12px;
    font-weight: 800;
    text-align: center;
    cursor: pointer;
    color: var(--gray-1);
    border: none;
    background: none;
    border-radius: 8px;
    transition: all 0.15s;
    min-height: 40px;
    letter-spacing: 0.3px;
    font-family: inherit;
  }
  .toggle-opt.active { background: var(--s1); color: var(--gold); box-shadow: 0 2px 8px rgba(0,0,0,0.35); }

  /* ── CALC PREVIEW ── */
  #calc-preview {
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
  }
  #calc-preview .preview-title {
    font-size: 10px;
    font-weight: 800;
    color: var(--gray-1);
    letter-spacing: 1.4px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .calc-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .calc-row:last-child { border-bottom: none; }
  .calc-lbl { color: var(--gray-1); font-size: 12px; }
  .calc-val { font-weight: 700; }
  .calc-val.gold  { color: var(--gold); }
  .calc-val.green { color: var(--green); }
  .calc-val.red   { color: var(--red); }
  .profit-warn {
    background: rgba(239,83,80,0.07);
    border: 1px solid rgba(239,83,80,0.22);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 12px;
    color: var(--red);
    margin-top: 10px;
    font-weight: 700;
  }

  /* ── BUTTONS ── */
  .btn {
    width: 100%;
    padding: 16px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 800;
    border: none;
    cursor: pointer;
    min-height: 52px;
    transition: all 0.15s;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: inherit;
  }
  .btn:active { transform: scale(0.98); opacity: 0.9; }
  .btn-gold {
    background: linear-gradient(135deg, #D4A843 0%, #B8902E 100%);
    color: #0B1120;
    box-shadow: 0 4px 18px rgba(212,168,67,0.35);
  }
  .btn-gold:hover { box-shadow: 0 6px 26px rgba(212,168,67,0.50); }
  .btn-red   { background: rgba(239,83,80,0.10); border: 1px solid rgba(239,83,80,0.28); color: var(--red); }
  .btn-ghost { background: var(--s1); border: 1px solid var(--border); color: var(--gray-1); }

  .btn-sm {
    padding: 9px 16px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 800;
    border: none;
    cursor: pointer;
    min-height: 36px;
    transition: all 0.15s;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    font-family: inherit;
  }
  .btn-sm.copied { background: var(--green) !important; color: #000 !important; }

  /* ── DETAIL PAGE ── */
  #back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--gold);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    padding: 0;
    margin-bottom: 18px;
    min-height: 44px;
    font-family: inherit;
    letter-spacing: 0.3px;
  }

  .detail-header {
    background: var(--s1);
    border: 1px solid var(--border);
    border-top: 2px solid var(--gold);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .detail-header::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 130px; height: 130px;
    background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
    pointer-events: none;
  }
  .detail-header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }
  .detail-ref {
    font-size: 10px;
    color: var(--gray-1);
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .detail-route {
    font-size: 24px;
    font-weight: 800;
    color: var(--white);
    margin: 6px 0;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .detail-airline { font-size: 13px; color: var(--gray-1); margin-bottom: 4px; }
  .detail-ts      { font-size: 11px; color: var(--gray-2); margin-bottom: 10px; }
  .detail-pix {
    font-size: 32px;
    font-weight: 800;
    color: var(--gold);
    letter-spacing: -1px;
    line-height: 1;
  }
  .detail-inst { font-size: 13px; color: var(--gray-1); margin-top: 4px; }
  .detail-edit-btn {
    background: var(--gold-dim);
    border: 1px solid var(--gold-line);
    border-radius: 8px;
    color: var(--gold);
    font-size: 11px;
    font-weight: 800;
    padding: 8px 14px;
    cursor: pointer;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    font-family: inherit;
    transition: all 0.15s;
  }
  .detail-edit-btn:hover { background: var(--gold-glow); }

  /* ── FINANCIAL / SECTION BOXES ── */
  .financial-box {
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .section-card {
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .section-title {
    font-size: 10px;
    font-weight: 800;
    color: var(--gray-1);
    letter-spacing: 1.4px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .fin-title {
    font-size: 10px;
    font-weight: 800;
    color: var(--gray-1);
    letter-spacing: 1.4px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .fin-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .fin-row:last-child { border-bottom: none; }

  /* ── COPY BLOCK ── */
  .copy-block {
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .copy-block-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .copy-block-title {
    font-size: 10px;
    font-weight: 800;
    color: var(--gray-1);
    letter-spacing: 1.4px;
    text-transform: uppercase;
  }
  .copy-text {
    background: var(--s3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    font-size: 13px;
    color: var(--gray-1);
    white-space: pre-wrap;
    word-break: break-all;
    line-height: 1.7;
    max-height: 220px;
    overflow-y: auto;
  }

  .btn-link-full {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 16px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 800;
    background: linear-gradient(135deg, #D4A843 0%, #B8902E 100%);
    color: #0B1120;
    text-decoration: none;
    margin-bottom: 12px;
    min-height: 52px;
    letter-spacing: 1px;
    text-transform: uppercase;
    box-shadow: 0 4px 18px rgba(212,168,67,0.35);
  }

  /* ── BACKUP ── */
  .backup-card {
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 12px;
  }
  .backup-card-title { font-size: 15px; font-weight: 700; color: var(--white); margin-bottom: 6px; }
  .backup-card-sub   { font-size: 13px; color: var(--gray-1); margin-bottom: 14px; line-height: 1.5; }
  #file-input { display: none; }
  .file-label {
    display: block;
    width: 100%;
    padding: 14px;
    border-radius: var(--radius-sm);
    border: 1.5px dashed var(--border-hi);
    background: var(--s3);
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--gray-1);
    cursor: pointer;
    min-height: 48px;
    transition: all 0.2s;
    letter-spacing: 0.3px;
    font-family: inherit;
  }
  .file-label:hover { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: calc(var(--nav-h) + var(--safe-b) + 16px);
    left: 16px;
    right: 16px;
    background: var(--s2);
    border: 1px solid var(--border-hi);
    border-radius: var(--radius-sm);
    padding: 13px 18px;
    font-size: 14px;
    font-weight: 700;
    color: var(--white);
    text-align: center;
    z-index: 999;
    opacity: 1;
    transition: opacity 0.3s;
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.55);
    letter-spacing: 0.2px;
  }
  #toast.visible { display: block; }
  #toast.hidden  { opacity: 0; }

  /* ── DIALOG ── */
  #dialog-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 200;
    display: none;
    align-items: flex-end;
  }
  #dialog-overlay.visible { display: flex; }
  #dialog-box {
    width: 100%;
    background: var(--s1);
    border-top: 1px solid rgba(255,255,255,0.06);
    border-radius: 22px 22px 0 0;
    padding: 24px 16px calc(var(--safe-b) + 20px);
    box-shadow: 0 -8px 40px rgba(0,0,0,0.65);
  }
  .dialog-title { font-size: 18px; font-weight: 800; color: var(--white); margin-bottom: 8px; letter-spacing: -0.3px; }
  .dialog-msg   { font-size: 14px; color: var(--gray-1); margin-bottom: 22px; line-height: 1.6; }
  .dialog-btns  { display: flex; flex-direction: column; gap: 10px; }
  .dialog-btn   { width: 100%; padding: 15px; border-radius: var(--radius); font-size: 13px; font-weight: 800; border: none; cursor: pointer; min-height: 50px; letter-spacing: 0.6px; font-family: inherit; }

  /* ── iOS SWITCH ── */
  .switch-wrap { display: flex; align-items: center; gap: 10px; }
  .switch { position: relative; width: 44px; height: 26px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute;
    inset: 0;
    background: var(--gray-3);
    border-radius: 13px;
    transition: background 0.2s;
    cursor: pointer;
  }
  .slider::before {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    left: 3px; top: 3px;
    background: var(--white);
    border-radius: 50%;
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    transition: transform 0.2s;
  }
  .switch input:checked + .slider { background: var(--gold); }
  .switch input:checked + .slider::before { transform: translateX(18px); }
  .switch-label { font-size: 14px; color: var(--white); font-weight: 500; }

  /* ── SECTION DIVIDER ── */
  .section-divider { display: flex; align-items: center; gap: 10px; margin: 22px 0 16px; }
  .section-divider::before, .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .section-divider span { font-size: 9px; font-weight: 800; color: var(--gray-2); letter-spacing: 2px; text-transform: uppercase; }

  /* ── UTILS ── */
  .hidden  { display: none !important; }
  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  /* ── DATES CHIP ── */
  .dates-row { background: var(--s3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 13px; color: var(--gray-1); margin-top: 4px; line-height: 1.5; }
  .dates-lbl { font-size: 10px; color: var(--gray-2); margin-bottom: 2px; font-weight: 700; letter-spacing: 1px; }

  /* ── AIRPORT AUTOCOMPLETE ── */
  .apt-wrap { position: relative; }
  .apt-dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--s2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    z-index: 300;
    max-height: 240px;
    overflow-y: auto;
    box-shadow: 0 16px 48px rgba(0,0,0,0.6);
  }
  .apt-opt {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .apt-opt:last-child { border-bottom: none; }
  .apt-opt:hover, .apt-opt:active { background: var(--gold-dim); }
  .apt-code {
    font-size: 12px;
    font-weight: 800;
    font-family: 'SF Mono', 'Menlo', monospace;
    color: var(--gold);
    min-width: 36px;
    letter-spacing: 2px;
  }
  .apt-city  { font-size: 14px; font-weight: 600; color: var(--white); flex: 1; }
  .apt-info  { font-size: 11px; color: var(--gray-2); text-align: right; max-width: 110px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── PREMIUM DASHBOARD OVERRIDES ── */
  :root {
    --bg: #0D1420;
    --s1: rgba(18,27,42,0.9);
    --s2: #172235;
    --s3: #0F1827;
    --gold: #D8B26E;
    --gold-light: #E8C98C;
    --gold-dim: rgba(216,178,110,0.14);
    --gold-glow: rgba(216,178,110,0.20);
    --gold-line: rgba(216,178,110,0.30);
    --white: #F6F8FC;
    --gray-1: #A3B0C5;
    --gray-2: #6F7F9B;
    --gray-3: #223049;
    --green: #31C48D;
    --yellow: #F1C15D;
    --red: #F87171;
    --border: rgba(148,163,184,0.14);
    --border-hi: rgba(216,178,110,0.34);
    --navy: #0A111B;
    --radius: 22px;
    --radius-sm: 16px;
    --shadow: 0 24px 60px rgba(1, 8, 20, 0.38);
    --shadow-sm: 0 12px 30px rgba(1, 8, 20, 0.26);
  }

  html,
  body {
    background:
      radial-gradient(circle at top left, rgba(49,196,141,0.08), transparent 32%),
      radial-gradient(circle at top right, rgba(216,178,110,0.14), transparent 28%),
      linear-gradient(180deg, #09111B 0%, #0D1420 48%, #0B121C 100%);
    color: var(--white);
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 120px 120px;
    mask-image: linear-gradient(180deg, rgba(0,0,0,0.5), transparent 85%);
    opacity: 0.35;
    z-index: 0;
  }

  #app {
    position: relative;
    isolation: isolate;
    min-height: 100dvh;
  }

  #app-header {
    position: sticky;
    top: 0;
    margin: 0;
    padding: calc(var(--safe-t) + 16px) 20px 14px;
    background: rgba(8,17,27,0.72);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .hdr-brand {
    gap: 14px;
    align-items: center;
  }

  .hdr-logo {
    font-size: 24px;
    font-weight: 800;
    color: var(--white);
    letter-spacing: -1.6px;
  }

  .hdr-wordmark,
  .hdr-context,
  .hdr-count {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: rgba(18,27,42,0.72);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .hdr-wordmark {
    color: var(--gold-light);
    border-color: var(--gold-line);
    background: rgba(216,178,110,0.12);
  }

  .hdr-context {
    color: var(--white);
  }

  .hdr-count {
    color: var(--gray-1);
  }

  #hdr-right {
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  #main {
    position: relative;
    z-index: 1;
    padding: 24px 18px calc(112px + var(--safe-b));
  }

  .page-shell,
  .workspace-main,
  .workspace-side,
  .detail-main,
  .detail-side {
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-width: 0;
  }

  .page-hero,
  .workspace-grid,
  .detail-layout,
  .backup-grid {
    display: grid;
    grid-template-columns: minmax(0, 1.35fr) minmax(320px, 0.95fr);
    gap: 16px;
    align-items: start;
  }

  .backup-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .hero-panel,
  .section-card,
  .financial-box,
  .copy-block,
  .backup-card,
  #calc-preview,
  .stat-box,
  .alert-card {
    background:
      linear-gradient(180deg, rgba(20,31,48,0.96) 0%, rgba(12,21,33,0.94) 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
  }

  .hero-panel,
  .section-card,
  .financial-box,
  .copy-block,
  .backup-card,
  #calc-preview {
    padding: 22px;
    margin-bottom: 0;
    overflow: hidden;
    position: relative;
  }

  .hero-panel::before,
  .detail-header::before,
  .section-card::before,
  .financial-box::before,
  .copy-block::before,
  .backup-card::before,
  #calc-preview::before {
    content: '';
    position: absolute;
    inset: 0 auto auto 0;
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-line), transparent);
    opacity: 0.8;
    pointer-events: none;
  }

  .hero-panel-main {
    min-height: 220px;
  }

  .hero-panel-side {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 18px;
  }

  .hero-kicker,
  .section-eyebrow,
  .section-title,
  .fin-title,
  .copy-block-title,
  .preview-title {
    font-size: 11px;
    font-weight: 800;
    color: var(--gray-1);
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .hero-kicker,
  .section-eyebrow {
    margin-bottom: 14px;
  }

  .page-title {
    margin-bottom: 10px;
    font-size: clamp(28px, 4vw, 40px);
    font-weight: 800;
    letter-spacing: -0.07em;
    line-height: 1.02;
  }

  .page-subtitle {
    margin-bottom: 0;
    max-width: 760px;
    font-size: 15px;
    line-height: 1.65;
    color: var(--gray-1);
  }

  .hero-badge-row,
  .alert-meta-row,
  .detail-chip-row,
  .support-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .hero-badge,
  .mini-chip,
  .detail-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.04);
    font-size: 12px;
    font-weight: 700;
    color: var(--gray-1);
  }

  .hero-badge strong,
  .mini-chip strong,
  .detail-chip strong {
    color: var(--white);
    font-weight: 800;
  }

  .mini-chip.default {
    color: var(--gray-1);
  }

  .mini-chip.positive,
  .detail-chip.positive {
    color: var(--green);
    border-color: rgba(49,196,141,0.24);
    background: rgba(49,196,141,0.10);
  }

  .mini-chip.warn,
  .detail-chip.warn {
    color: var(--yellow);
    border-color: rgba(241,193,93,0.26);
    background: rgba(241,193,93,0.10);
  }

  .mini-chip.risk,
  .detail-chip.risk {
    color: var(--red);
    border-color: rgba(248,113,113,0.24);
    background: rgba(248,113,113,0.10);
  }

  .hero-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 18px 0;
  }

  #stats-bar,
  .hero-metrics {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    margin: 0;
  }

  .stat-box {
    position: relative;
    overflow: hidden;
    padding: 18px;
    text-align: left;
  }

  .stat-box::after {
    left: 18px;
    right: 18px;
    top: auto;
    bottom: 0;
    height: 2px;
  }

  .stat-num {
    font-size: clamp(30px, 3vw, 42px);
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.08em;
  }

  .stat-lbl {
    margin-top: 10px;
    font-size: 11px;
    color: var(--gray-1);
    letter-spacing: 0.14em;
  }

  .stat-note {
    margin-top: 8px;
    font-size: 12px;
    color: var(--gray-2);
    line-height: 1.5;
  }

  .stat-positive .stat-num,
  .stat-positive .metric-value {
    color: var(--green);
  }

  .stat-warn .stat-num,
  .stat-warn .metric-value {
    color: var(--yellow);
  }

  .stat-risk .stat-num,
  .stat-risk .metric-value {
    color: var(--red);
  }

  .search-card,
  .section-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 18px 20px;
    background: rgba(15,24,39,0.74);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
  }

  .section-bar {
    flex-wrap: wrap;
  }

  .section-title-lg {
    font-size: 16px;
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.03em;
  }

  .section-note {
    font-size: 13px;
    color: var(--gray-1);
  }

  #search-wrap {
    margin: 0;
    flex: 1;
  }

  .search-shell {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-radius: 18px;
    background: rgba(8,17,27,0.62);
    border: 1px solid var(--border);
  }

  .search-shell::before {
    content: '⌕';
    color: var(--gray-2);
    font-size: 16px;
  }

  .search-input {
    padding: 0;
    background: transparent;
    border: none;
    box-shadow: none;
    font-size: 15px;
    color: var(--white);
  }

  .search-input:focus {
    border: none;
    box-shadow: none;
  }

  #alert-list,
  #pkg-list {
    display: grid;
    gap: 12px;
  }

  .alert-card {
    position: relative;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 18px;
    align-items: start;
    padding: 20px;
    border-left: none;
    margin-bottom: 0;
    transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
  }

  .alert-card::before {
    content: '';
    position: absolute;
    inset: 16px auto 16px 0;
    width: 4px;
    border-radius: 0 999px 999px 0;
    background: linear-gradient(180deg, var(--gold), rgba(216,178,110,0.20));
    opacity: 0.9;
  }

  .alert-card:hover {
    transform: translateY(-2px);
    border-color: rgba(216,178,110,0.22);
    background: linear-gradient(180deg, rgba(25,38,58,0.98) 0%, rgba(13,22,35,0.96) 100%);
    box-shadow: 0 18px 34px rgba(1,8,20,0.32);
  }

  .alert-card-body {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .alert-ref {
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 0;
    font-size: 11px;
    color: var(--gray-1);
    letter-spacing: 0.14em;
  }

  .alert-ts {
    display: inline-flex;
    align-items: center;
    padding: 5px 9px;
    border-radius: 999px;
    background: rgba(255,255,255,0.04);
    color: var(--gray-2);
    font-size: 11px;
  }

  .alert-route {
    font-size: clamp(22px, 3vw, 30px);
    line-height: 1.04;
    letter-spacing: -0.07em;
    white-space: normal;
    overflow: visible;

const STORAGE_KEY  = 'vck_v3';
const COUNTER_KEY  = 'vck_ctr';

function loadAlerts() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}

function saveAlerts(arr) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
}

const PKG_KEY = 'vck_pkg';
function loadPackages() { try { return JSON.parse(localStorage.getItem(PKG_KEY) || '[]'); } catch { return []; } }
function savePackages(arr) { localStorage.setItem(PKG_KEY, JSON.stringify(arr)); }

function getNextRef() {
  const now  = new Date();
  const dd   = String(now.getDate()).padStart(2, '0');
  const mm   = String(now.getMonth() + 1).padStart(2, '0');
  const today = dd + mm;

  let ctr = { d: today, n: 0 };
  try { ctr = JSON.parse(localStorage.getItem(COUNTER_KEY) || '{}'); } catch {}
  if (ctr.d !== today) { ctr = { d: today, n: 0 }; }
  ctr.n++;
  localStorage.setItem(COUNTER_KEY, JSON.stringify(ctr));
  return `${today}-${String(ctr.n).padStart(2, '0')}`;
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

// ─────────────────────────────────────────────
// AIRPORT AUTOCOMPLETE
// ─────────────────────────────────────────────
function setupAirportAutocomplete(inputId) {
  setTimeout(() => {
    const input = document.getElementById(inputId);
    if (!input) return;

    // Wrap input
    const parent = input.parentNode;
    const wrap = document.createElement('div');
    wrap.className = 'apt-wrap';
    parent.insertBefore(wrap, input);
    wrap.appendChild(input);

    // Dropdown
    const dd = document.createElement('div');
    dd.className = 'apt-dropdown';
    dd.style.display = 'none';
    wrap.appendChild(dd);

    let activeIdx = -1;

    input.addEventListener('input', () => {
      const q = input.value.trim().toLowerCase();
      activeIdx = -1;
      if (q.length < 2) { dd.style.display = 'none'; return; }

      const matches = AIRPORTS.filter(([iata, city, name]) =>
        iata.toLowerCase().startsWith(q) ||
        city.toLowerCase().includes(q) ||
        name.toLowerCase().includes(q) ||
        (iata + ' ' + city).toLowerCase().includes(q)
      ).slice(0, 7);

      if (!matches.length) { dd.style.display = 'none'; return; }

      dd.innerHTML = matches.map(([iata, city, name, ctry], i) =>
        `<div class="apt-opt" data-idx="${i}" onclick="selectAirport('${inputId}','${city.replace(/'/g,"\\'")}')">`+
        `<span class="apt-code">${iata}</span>`+
        `<span class="apt-city">${city}</span>`+
        `<span class="apt-info">${name}</span>`+
        `</div>`
      ).join('');
      dd.style.display = 'block';
    });

    input.addEventListener('keydown', (e) => {
      const opts = dd.querySelectorAll('.apt-opt');
      if (!opts.length) return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIdx = Math.min(activeIdx + 1, opts.length - 1);
        opts.forEach((o, i) => o.style.background = i === activeIdx ? '#2A2A2A' : '');
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIdx = Math.max(activeIdx - 1, 0);
        opts.forEach((o, i) => o.style.background = i === activeIdx ? '#2A2A2A' : '');
      } else if (e.key === 'Enter' && activeIdx >= 0) {
        e.preventDefault();
        opts[activeIdx].click();
      } else if (e.key === 'Escape') {
        dd.style.display = 'none';
      }
    });

    document.addEventListener('click', (e) => {
      if (!wrap.contains(e.target)) dd.style.display = 'none';
    }, true);

  }, 100);
}

function selectAirport(inputId, city) {
  const input = document.getElementById(inputId);
  if (!input) return;
  input.value = city;
  input.dispatchEvent(new Event('input', { bubbles: true }));
  const dd = input.parentNode.querySelector('.apt-dropdown');
  if (dd) dd.style.display = 'none';
  updateCalc();
}

// ─────────────────────────────────────────────
// RATES & CALC
// ─────────────────────────────────────────────
const LATAM_TIERS = [
  { max: 25000,  rate: 28.99 },
  { max: 50000,  rate: 27.49 },
  { max: 120000, rate: 26.99 },
  { max: Infinity, rate: 25.99 },
];

const SMILES_TIERS = [
  { max: 30000,  rate: 16.49 },
  { max: 70000,  rate: 15.99 },
  { max: Infinity, rate: 15.49 },
];

const INST_FEES = [
  null,   // 0 (placeholder)
  3.08,   // 1x
  5.55,   // 2x
  6.20,   // 3x
  6.91,   // 4x
  7.58,   // 5x
  8.26,   // 6x
  8.42,   // 7x
  9.16,   // 8x
  9.90,   // 9x
  10.45,  // 10x
];

const PROFIT_FLOOR = { intl: 200, nac: 100 };

function getRatePerMilheiro(airline, miles, customRate) {
  if (airline === 'LATAM') {
    return LATAM_TIERS.find(t => miles <= t.max).rate;
  }
  if (airline === 'SMILES' || airline === 'GOL') {
    return SMILES_TIERS.find(t => miles <= t.max).rate;
  }
  return customRate || 0;
}

function calcAlert(airline, miles, taxes, mktPrice, sellRate, pixOverride, type, customRate) {
  const ratePerMilheiro = getRatePerMilheiro(airline, miles, customRate);
  const milesCost   = (miles / 1000) * ratePerMilheiro;
  const totalCost   = milesCost + taxes;
  const floor       = PROFIT_FLOOR[type] || 100;
  const minPix      = totalCost + floor;

  // Revenue from sell rate (quanto o cliente paga pelas milhas)
  const sellRevenue = sellRate > 0 ? (miles / 1000) * sellRate + taxes : 0;
  const sellProfit  = sellRevenue > 0 ? sellRevenue - totalCost : 0;

  // Priority: pixOverride > sellRate (if profit ok) > minPix
  let finalPix;
  let pixAdjusted = false; // sell rate foi ajustado para cima por causa do piso
  if (pixOverride > 0) {
    finalPix = pixOverride;
  } else if (sellRevenue > 0) {
    if (sellProfit >= floor) {
      finalPix = sellRevenue;       // lucro ok — usa o preço calculado pela taxa
    } else {
      finalPix = minPix;            // lucro abaixo do piso — sobe para o mínimo
      pixAdjusted = true;
    }
  } else {
    finalPix = minPix;              // nenhuma entrada — usa mínimo
  }

  const profit  = finalPix - totalCost;
  const maxInst = finalPix >= 1000 ? 10 : 5;
  const economy = mktPrice > 0 ? mktPrice - finalPix : 0;

  const installments = [];
  for (let n = 1; n <= maxInst; n++) {
    const fee   = INST_FEES[n];
    const total = finalPix * (1 + fee / 100);
    installments.push({ n, total, per: total / n, fee });
  }

  return {
    ratePerMilheiro, milesCost, totalCost, minPix, finalPix, profit,
    sellRate, sellRevenue, sellProfit, pixAdjusted,
    maxInst, economy, installments, floor
  };
}

// ─────────────────────────────────────────────
// FORMAT
// ─────────────────────────────────────────────
function brl(v) {
  return 'R$ ' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function brlFloor(v) {
  return 'R$ ' + Math.floor(v).toLocaleString('pt-BR');
}

function formatTs(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const p = n => String(n).padStart(2, '0');
  return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()} às ${p(d.getHours())}:${p(d.getMinutes())}`;
}

function airlineName(a) {
  const n = { LATAM: 'LATAM', SMILES: 'SMILES', GOL: 'GOL', AZUL: 'AZUL', TAP: 'TAP', OUTRO: '' };
  return n[a] !== undefined ? n[a] : a;
}

function sanitizeLink(raw) {
  if (!raw) return '';
  const m = raw.match(/href=["']?([^"'\s>]+)/i);
  if (m) return m[1];
  if (raw.startsWith('http')) return raw.trim();
  return raw.trim();
}

// ─────────────────────────────────────────────
// WHATSAPP COPY
// ─────────────────────────────────────────────
function buildWhatsApp(alert) {
  let finalPix;

  if (alert.paymentMode === 'avista') {
    finalPix = (alert.avistaBase || 0) + (alert.avistaLucro || 0); // preço cartão
  } else {
    const c = calcAlert(alert.airline, alert.miles, alert.taxes, alert.mkt, alert.sellRate || 0, alert.pix, alert.type, alert.rate);
    finalPix = c.finalPix;
  }

  const economy = alert.mkt > 0 ? alert.mkt - finalPix : 0;

  // Linha de parcelamento
  let instLine;
  if (alert.semJuros && alert.semJurosParc > 0) {
    instLine = `\n💳 ${alert.semJurosParc}x de ${brl(finalPix / alert.semJurosParc)} sem juros`;
  } else if (alert.paymentMode !== 'avista') {
    const maxInst   = finalPix >= 1000 ? 10 : 5;
    const instFee   = INST_FEES[maxInst];
    const instTotal = finalPix * (1 + instFee / 100);
    const perInst   = instTotal / maxInst;
    instLine = `\n💳 ${maxInst}x de ${brl(perInst)} no cartão`;
  } else {
    instLine = '';
  }

  const aName = (alert.airline === 'OUTRO' || alert.airline === 'AZUL' || alert.airline === 'TAP')
    ? (alert.airname || airlineName(alert.airline))
    : airlineName(alert.airline);

  // Agrupa datas por mês: "Mai - 21/05/2026\nAgo - 05/08/2026,  12/08/2026"
  const normDates = (raw) => {
    if (!raw) return null;
    const MESES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    const parts = raw.split(/[\s,·\n]+/).map(d => d.trim()).filter(d => /^\d{2}\/\d{2}\/\d{4}$/.test(d));
    if (!parts.length) return raw.trim();
    // Ordenar por data
    parts.sort((a, b) => {
      const [da, ma, ya] = a.split('/').map(Number);
      const [db, mb, yb] = b.split('/').map(Number);
      return (ya - yb) || (ma - mb) || (da - db);
    });
    // Agrupar por mês/ano
    const groups = new Map();
    parts.forEach(d => {
      const [, m, y] = d.split('/').map(Number);
      const key = `${y}-${String(m).padStart(2,'0')}`;
      if (!groups.has(key)) groups.set(key, { label: MESES[m-1], dates: [] });
      groups.get(key).dates.push(d);
    });
    return Array.from(groups.values()).map(g => `${g.label} - ${g.dates.join(',  ')}`).join('\n');
  };

  // Helper: retorna só o número sem o prefixo "R$" (inclusive espaço não-quebrável) para usar dentro do tachado
  const num = (x) => brl(x).replace(/^R\$\s*/u, '');

  let txt = `*${alert.origin} → ${alert.dest}${alert.direct ? ' | Voo Direto' : ''}*`;
  txt += `\n\n*${aName}* | Preço final com taxas`;
  if (alert.paymentMode === 'avista' && alert.pixDesconto > 0) {
    // Modo Valor Direto COM valor no Pix — cartão fica com preço cheio
    const pixPrice  = alert.pixDesconto; // IS o preço real no Pix
    const economia  = finalPix - pixPrice;
    const instPart  = alert.semJuros && alert.semJurosParc > 0
      ? ` | ${alert.semJurosParc}x de ${brl(finalPix / alert.semJurosParc)} sem juros`
      : '';
    txt += `\n\n💳 *${brl(finalPix)} no cartão*${instPart}`;
    txt += `\n💰 R$ ~${num(finalPix)}~ → *${brl(pixPrice)} no Pix*`;
    if (economia > 0) txt += ` — economia de *${brl(economia)}*`;
    if (alert.mkt > 0) {
      txt += `\n\nR$ ~${num(alert.mkt)}~ → *${brl(pixPrice)}*`;
      txt += `\nEconomia de *${brl(alert.mkt - pixPrice)}* por pessoa`;
    }
  } else {
    txt += `\n\n💰 ${brl(finalPix)}${alert.paymentMode === 'avista' ? ' à vista' : ' via Pix'}`;
    txt += instLine;
    if (alert.mkt > 0) {
      txt += `\n\nR$ ~${num(alert.mkt)}~ → *${brl(finalPix)}*`;
      txt += `\nEconomia de *${brl(economy)}* por pessoa`;
    }
  }
  if (alert.boleto) {
    const boletoVal = brl(finalPix / 10);
    txt += `\n\n📄 *Boleto:* 1+9 de ${boletoVal} sem juros`;
  }
  const dOut = normDates(alert.dOut);
  if (dOut) {
    txt += `\n\n📅 *Datas de ida disponíveis:*`;
    txt += `\n${dOut}`;
  }
  const dIn = normDates(alert.dIn);
  if (dIn) {
    txt += `\n\n📅 *Datas de volta disponíveis:*`;
    txt += `\n${dIn}`;
  }
  txt += `\n\n👉 *Para emitir*: só me encaminhar a referência no privado.`;
  txt += `\n\nSujeito à disponibilidade. | Ref: ${alert.ref}`;
  txt += `\n_VoeComKennedy_`;
  return txt;
}

// ─────────────────────────────────────────────
// CLIPBOARD
// ─────────────────────────────────────────────
function copyText(text, btn) {
  const orig = btn.textContent;
  const doSuccess = () => {
    btn.textContent = 'Copiado!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = orig;
      btn.classList.remove('copied');
    }, 2000);
  };

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(doSuccess).catch(() => fallbackCopy(text, doSuccess));
  } else {
    fallbackCopy(text, doSuccess);
  }
}

function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); cb(); } catch {}
  document.body.removeChild(ta);
}

// TOAST
// ─────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  t.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    t.classList.add('hidden');
    setTimeout(() => t.classList.remove('visible'), 300);
  }, 2500);
}

// ─────────────────────────────────────────────
// DIALOG
// ─────────────────────────────────────────────
function showDialog(title, msg, buttons) {
  document.getElementById('dialog-title').textContent = title;
  document.getElementById('dialog-msg').textContent   = msg;
  const btnsEl = document.getElementById('dialog-btns');
  btnsEl.innerHTML = '';
  buttons.forEach(b => {
    const el = document.createElement('button');
    el.className = 'dialog-btn ' + (b.cls || 'btn-ghost');
    el.textContent = b.label;
    el.onclick = () => {
      closeDialog();
      b.action && b.action();
    };
    btnsEl.appendChild(el);
  });
  document.getElementById('dialog-overlay').classList.add('visible');
}

function closeDialog() {
  document.getElementById('dialog-overlay').classList.remove('visible');
}

document.getElementById('dialog-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeDialog();
});

function getAlertSnapshot(alert) {
  const pix = alert.pix || ((alert.avistaBase || 0) + (alert.avistaLucro || 0));

  if (alert.paymentMode === 'avista') {
    const profit = alert.avistaLucro || 0;
    const economy = alert.mkt > 0 ? alert.mkt - (alert.pixDesconto || pix) : 0;
    const tone = profit > 0 ? 'positive' : 'warn';

    return {
      pix,
      profit,
      economy,
      tone,
      label: profit > 0 ? `Lucro ${brl(profit)}` : 'Margem a revisar',
    };
  }

  const calc = calcAlert(
    alert.airline,
    alert.miles,
    alert.taxes,
    alert.mkt,
    alert.sellRate || 0,
    alert.pix,
    alert.type,
    alert.rate
  );
  const profit = calc.profit || 0;
  const economy = alert.mkt > 0 ? alert.mkt - pix : 0;

  return {
    pix,
    profit,
    economy,
    tone: profit >= calc.floor ? 'positive' : 'risk',
    label: `Lucro ${brl(profit)}`,
  };
}

function renderAlertList() {
  const alerts = loadAlerts();
  const q = searchQuery.toLowerCase().trim();
  let filtered = q ? alerts.filter(a => {
    return (a.ref || '').toLowerCase().includes(q)
      || (a.origin || '').toLowerCase().includes(q)
      || (a.dest || '').toLowerCase().includes(q)
      || (a.airline || '').toLowerCase().includes(q)
      || (a.airname || '').toLowerCase().includes(q)
      || (a.regiao || '').toLowerCase().includes(q);
  }) : alerts;
  if (filterRegiao) {
    filtered = filtered.filter(a => (a.regiao || '') === filterRegiao);
  }

  const el = document.getElementById('alert-list');

  if (filtered.length === 0) {

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
}

function backToList() {
  currentDetail = null;
  render();
  // Restore search
  setTimeout(() => {
    const inp = document.getElementById('search-input');
    if (inp) {
      inp.value = searchQuery;
      inp.addEventListener('input', e => {
        searchQuery = e.target.value;
        renderAlertList();
      });
      renderAlertList();
    }
  }, 0);
}

function confirmDelete(id) {
  showDialog(
    'Excluir alerta',
    'Esta acao nao pode ser desfeita.',
    [
      { label: 'Excluir', cls: 'btn-red', action: () => deleteAlert(id) },
      { label: 'Cancelar', cls: 'btn-ghost' }
    ]
  );
}

function deleteAlert(id) {
  let alerts = loadAlerts();
  alerts = alerts.filter(a => a.id !== id);
  saveAlerts(alerts);
  currentDetail = null;
  showToast('Alerta excluido');
  render();
  setTimeout(() => {
    const inp = document.getElementById('search-input');
    if (inp) {
      inp.value = searchQuery;
      inp.addEventListener('input', e => { searchQuery = e.target.value; renderAlertList(); });
      renderAlertList();
    }
  }, 0);
}

function editAlert(id) {
  editingId = id;
  currentDetail = null;
  currentPage = 'new';
  ['list','new','backup'].forEach(x => {
    document.getElementById('nb-' + x).classList.toggle('active', x === 'new');
  });
  render();
}

function initForm() {
  // Setup airport autocomplete (after form is in DOM)
  setupAirportAutocomplete('f-origin');
  setupAirportAutocomplete('f-dest');

  // If editing, fill form
  if (editingId) {
    const alerts = loadAlerts();
    const a = alerts.find(x => x.id === editingId);
    if (a) {
      fAirline      = a.airline;
      fType         = a.type;
      fPayment      = a.paymentMode || 'milhas';
      fSemJuros     = !!a.semJuros;
      fSemJurosParc = a.semJurosParc || 2;
      fBoleto       = !!a.boleto;
      // Re-render to set selected states
      document.getElementById('main').innerHTML = renderForm();
      // Now fill values
      setVal('f-origin', a.origin);
      setVal('f-dest',   a.dest);
      setVal('f-flag',   a.flag);
      setVal('f-miles',  a.miles);
      setVal('f-taxes',  a.taxes);
      setVal('f-mkt',    a.mkt);
      setVal('f-pix',    a.pix || '');
      setVal('f-avista',        a.avistaBase   || '');
      setVal('f-avista-lucro',  a.avistaLucro  || '');
      setVal('f-pix-desconto',  a.pixDesconto  || '');
      setVal('f-dout',   a.dOut);
      setVal('f-din',    a.dIn);
      setVal('f-link',   a.link);
      const dc = document.getElementById('f-direct');
      if (dc) dc.checked = !!a.direct;
      fRegiao    = a.regiao    || '';
      fSchedTime = a.schedTime || '';
      if (fRegiao) selectRegiao(fRegiao, 'f');
      const stEl = document.getElementById('f-schedtime');
      if (stEl && fSchedTime) stEl.value = fSchedTime;
    }
  }
  // Wire auto-detect de regiao pela origem
  const originEl = document.getElementById('f-origin');
  if (originEl) {
    originEl.addEventListener('change', () => {
      if (!fRegiao) autoDetectRegiao(originEl.value, 'f');
    });
    originEl.addEventListener('blur', () => {
      if (!fRegiao) autoDetectRegiao(originEl.value, 'f');
    });
  }
  renderCustomAirlineFields();
  updateCalc();
}

function sanitizeLinkInput() {

function getNum(id) {
  const el = document.getElementById(id);
  if (!el) return 0;
  const raw = el.value.trim();
  let norm;
  if (raw.includes(',')) {
    // Formato BR: "2.000,50" ou "2000,50" — ponto = milhar, vírgula = decimal
    norm = raw.replace(/\./g, '').replace(',', '.');
  } else {
    const dots = (raw.match(/\./g) || []).length;
    if (dots > 1) {
      // Múltiplos pontos = separador de milhar: "1.000.000"
      norm = raw.replace(/\./g, '');
    } else if (dots === 1 && raw.split('.')[1].length === 3) {
      // Um ponto com 3 dígitos depois = milhar: "93.000" → 93000
      norm = raw.replace(/\./g, '');
    } else {
      // Ponto decimal normal: "2665.79"
      norm = raw;
    }
  }
  const v = parseFloat(norm);
  return isNaN(v) ? 0 : v;
}

function updateCalc() {
  const el = document.getElementById('calc-rows');
  if (!el) return;
  const mkt = getNum('f-mkt');

  // ── MODO VALOR DIRETO ──
  if (fPayment === 'avista') {
    const avistaBase   = getNum('f-avista');
    const avistaLucro  = getNum('f-avista-lucro');
    const pixValor     = getNum('f-pix-desconto'); // agora é o VALOR DIRETO no Pix
    if (avistaBase <= 0) {
      el.innerHTML = '<div style="color:var(--gray-2);font-size:13px">Preencha o valor à vista para calcular.</div>';
      return;
    }
    const finalPix  = avistaBase + avistaLucro;                        // preço cartão
    const pixPrice  = pixValor > 0 ? pixValor : 0;                    // preço Pix (direto)
    const economia  = pixPrice > 0 ? finalPix - pixPrice : 0;         // economia no Pix
    const instLine  = fSemJuros && fSemJurosParc > 0
      ? `${fSemJurosParc}x de ${brl(finalPix / fSemJurosParc)} sem juros`
      : `—`;
    const boletoVal = brl(finalPix / 10);
    el.innerHTML = `
      <div class="calc-row">
        <span class="calc-lbl">Valor base</span>
        <span class="calc-val">${brl(avistaBase)}</span>
      </div>
      <div class="calc-row">
        <span class="calc-lbl"><strong>Lucro</strong></span>
        <span class="calc-val green"><strong>${brl(avistaLucro)}</strong></span>
      </div>
      <div class="calc-row">
        <span class="calc-lbl">Preço no cartão</span>
        <span class="calc-val gold">${brl(finalPix)}</span>
      </div>
      ${pixPrice > 0 ? `<div class="calc-row">
        <span class="calc-lbl"><strong>Valor no Pix</strong></span>
        <span class="calc-val green"><strong>${brl(pixPrice)}</strong></span>
      </div>
      <div class="calc-row">
        <span class="calc-lbl">Economia no Pix</span>
        <span class="calc-val green">- ${brl(economia)}</span>
      </div>` : ''}
      ${fSemJuros && fSemJurosParc > 0 ? `<div class="calc-row">
        <span class="calc-lbl">Parcelas sem juros</span>
        <span class="calc-val">${instLine}</span>
      </div>` : ''}
      ${fBoleto ? `<div class="calc-row">
        <span class="calc-lbl">Boleto (entrada + 9x)</span>
        <span class="calc-val">${boletoVal}/parcela</span>
      </div>` : ''}
      ${mkt > 0 ? `<div class="calc-row">
        <span class="calc-lbl">Economia cliente (vs CIA)</span>
        <span class="calc-val green">${brl(mkt - (pixPrice > 0 ? pixPrice : finalPix))}</span>
      </div>` : ''}
    `;
    return;
  }

  // ── MODO MILHAS ──
  const miles    = getNum('f-miles');
  const taxes    = getNum('f-taxes');
  const sellRate = getNum('f-sellrate');
  const pixIn    = getNum('f-pix');
  const rate     = getNum('f-rate');

  if (miles <= 0) {
    el.innerHTML = '<div style="color:var(--gray-2);font-size:13px">Preencha milhas e taxas para calcular.</div>';
    return;
  }

  const c = calcAlert(fAirline, miles, taxes, mkt, sellRate, pixIn, fType, rate);

  // Auto-calc PRECO CIA: Pix × 1.30 (nac) ou Pix × 1.20 (intl), só se não foi editado manualmente
  if (!mktManual && c.finalPix > 0) {
    const mult = fType === 'nac' ? 1.30 : 1.20;
    const autoMkt = Math.round(c.finalPix * mult * 100) / 100;
    const mktEl = document.getElementById('f-mkt');
    if (mktEl) mktEl.value = autoMkt.toFixed(2);
  }

  const profitOk = c.profit >= c.floor;
  const instLbl  = fSemJuros && fSemJurosParc > 0
    ? `${fSemJurosParc}x sem juros de ${brl(c.finalPix / fSemJurosParc)}`
    : `${c.maxInst}x de ${brl(c.installments[c.maxInst-1].per)}`;

  el.innerHTML = `
    <div class="calc-row">
      <span class="calc-lbl">Custo/milheiro (tabela)</span>
      <span class="calc-val">${brl(c.ratePerMilheiro)}</span>
    </div>
    ${sellRate > 0 ? `<div class="calc-row">
      <span class="calc-lbl">Venda/milheiro (voce)</span>
      <span class="calc-val gold">${brl(sellRate)}</span>
    </div>` : ''}
    <div class="calc-row" style="border-top:1px solid var(--border);padding-top:6px;margin-top:2px">
      <span class="calc-lbl">Custo milhas</span>
      <span class="calc-val">${brl(c.milesCost)}</span>
    </div>
    ${sellRate > 0 ? `<div class="calc-row">
      <span class="calc-lbl">Receita milhas</span>
      <span class="calc-val">${brl((miles/1000)*sellRate)}</span>
    </div>` : ''}
    <div class="calc-row">
      <span class="calc-lbl">Custo total (milhas + taxas)</span>
      <span class="calc-val">${brl(c.totalCost)}</span>
    </div>
    ${sellRate > 0 ? `<div class="calc-row">
      <span class="calc-lbl">Pix pela sua taxa</span>
      <span class="calc-val">${brl(c.sellRevenue)}</span>
    </div>
    <div class="calc-row">
      <span class="calc-lbl">Lucro pela taxa</span>
      <span class="calc-val ${c.sellProfit >= c.floor ? 'green' : 'red'}">${brl(c.sellProfit)}${c.sellProfit < c.floor ? ' ⚠ abaixo do piso' : ' ✓'}</span>
    </div>` : ''}
    <div class="calc-row" style="border-top:1px solid var(--border);padding-top:6px;margin-top:2px">
      <span class="calc-lbl">Piso minimo</span>
      <span class="calc-val">${brl(c.minPix)}</span>
    </div>
    ${c.pixAdjusted ? `<div class="calc-row">
      <span class="calc-lbl" style="color:var(--gold)">Pix ajustado (piso atingido)</span>
      <span class="calc-val gold">${brl(c.finalPix)}</span>
    </div>` : `<div class="calc-row">
      <span class="calc-lbl">Pix final</span>
      <span class="calc-val gold">${brl(c.finalPix)}</span>
    </div>`}
    <div class="calc-row">
      <span class="calc-lbl"><strong>Lucro</strong></span>
      <span class="calc-val ${profitOk ? 'green' : 'red'}"><strong>${brl(c.profit)}</strong></span>
    </div>
    <div class="calc-row">
      <span class="calc-lbl">Parcelamento</span>
      <span class="calc-val">${instLbl}</span>
    </div>
    ${mkt > 0 ? `<div class="calc-row">
      <span class="calc-lbl">Economia cliente</span>
      <span class="calc-val green">${brl(mkt - c.finalPix)}</span>
    </div>` : ''}
    ${fBoleto ? `<div class="calc-row">
      <span class="calc-lbl">Boleto (entrada + 9x)</span>
      <span class="calc-val">${brl(c.finalPix / 10)}/parcela</span>
    </div>` : ''}
    ${!profitOk ? `<div class="profit-warn">Atencao: lucro abaixo do minimo de ${brl(c.floor)} para ${fType === 'intl' ? 'internacional' : 'nacional'}.</div>` : ''}
  `;
}

const IATA_REGIAO = {
  GRU:'Sudeste',CGH:'Sudeste',VCP:'Sudeste',SDU:'Sudeste',GIG:'Sudeste',
  CNF:'Sudeste',PLU:'Sudeste',VIX:'Sudeste',UDI:'Sudeste',GYN:'Centro-Oeste',

  MAO:'Norte',BEL:'Norte',STM:'Norte',PMW:'Norte',RBR:'Norte',OPS:'Norte',
  BSB:'Centro-Oeste',CGO:'Centro-Oeste',CGB:'Centro-Oeste',CMG:'Centro-Oeste',
};
const CITY_REGIAO_KW = [
  ['sao paulo','Sudeste'],['rio de janeiro','Sudeste'],['belo horizonte','Sudeste'],
  ['vitoria','Sudeste'],['campinas','Sudeste'],['guarulhos','Sudeste'],
  ['porto alegre','Sul'],['curitiba','Sul'],['florianopolis','Sul'],
  ['foz do iguacu','Sul'],['joinville','Sul'],['londrina','Sul'],
  ['fortaleza','Nordeste'],['salvador','Nordeste'],['recife','Nordeste'],
  ['natal','Nordeste'],['maceio','Nordeste'],['joao pessoa','Nordeste'],
  ['teresina','Nordeste'],['sao luis','Nordeste'],['feira de santana','Nordeste'],
  ['manaus','Norte'],['belem','Norte'],['porto velho','Norte'],['rio branco','Norte'],
  ['santarem','Norte'],['macapa','Norte'],['palmas','Norte'],
  ['brasilia','Centro-Oeste'],['goiania','Centro-Oeste'],['cuiaba','Centro-Oeste'],
  ['campo grande','Centro-Oeste'],['anapolis','Centro-Oeste'],
];
function detectRegiao(origin) {
  if (!origin) return '';
  const up = origin.toUpperCase().replace(/\s/g,'');
  if (IATA_REGIAO[up]) return IATA_REGIAO[up];
  const lo = origin.toLowerCase();
  for (const [kw, reg] of CITY_REGIAO_KW) {
    if (lo.includes(kw)) return reg;
  }
  return '';
}
const REGIOES = ['Norte','Nordeste','Centro-Oeste','Sudeste','Sul'];

function autoDetectRegiao(origin, prefix) {

function saveForm() {
  const origin   = (document.getElementById('f-origin')?.value || '').trim();
  const dest     = (document.getElementById('f-dest')?.value   || '').trim();
  const mkt      = getNum('f-mkt');

  // Sem juros + Boleto

  const boleto       = document.getElementById('f-boleto')?.checked || false;

  if (!origin || !dest) { showToast('Preencha origem e destino'); return; }

  let miles = 0, taxes = 0, sellRate = 0, pixIn = 0, rate = 0, finalPix = 0;
  let avistaBase = 0, avistaLucro = 0;

  let pixDesconto = 0;
  if (fPayment === 'avista') {
    avistaBase   = getNum('f-avista');

  } else {
    miles    = getNum('f-miles');
    taxes    = getNum('f-taxes');
    sellRate = getNum('f-sellrate');
    pixIn    = getNum('f-pix');
    rate     = getNum('f-rate');
    if (miles <= 0) { showToast('Preencha as milhas'); return; }
    const c  = calcAlert(fAirline, miles, taxes, mkt, sellRate, pixIn, fType, rate);
    finalPix = c.finalPix;
  }

  const direct  = document.getElementById('f-direct')?.checked || false;
  const flag    = (document.getElementById('f-flag')?.value || '').trim();
  const dOut    = (document.getElementById('f-dout')?.value || '').trim();
  const dIn     = (document.getElementById('f-din')?.value  || '').trim();
  const link      = sanitizeLink(document.getElementById('f-link')?.value || '');
  const regiao    = fRegiao;
  const schedTime = (document.getElementById('f-schedtime')?.value || '').trim();

  const alerts = loadAlerts();

    fAirline = 'LATAM'; fType = 'intl'; mktManual = false;
    fPayment = 'milhas'; fSemJuros = false; fSemJurosParc = 2; fBoleto = false;
    fRegiao = ''; fSchedTime = '';
  };

  if (editingId) {
    const idx = alerts.findIndex(a => a.id === editingId);
    if (idx >= 0) {
      alerts[idx] = {
        ...alerts[idx],
        airline:      fAirline,
        airname,
        rate,
        sellRate,
        type:         fType,
        origin,
        dest,
        flag,
        miles,
        taxes,
        mkt,
        pix:          finalPix,
        direct,
        dOut,
        dIn,
        link,
        paymentMode:  fPayment,
        avistaBase,
        avistaLucro,
        pixDesconto,
        semJuros,
        semJurosParc,
        boleto,
        regiao,
        schedTime,
      };
      saveAlerts(alerts);
      showToast('Alerta atualizado');
      editingId = null;
      currentPage = 'list';
      resetFormState();
      ['list','new','backup'].forEach(x => {
        document.getElementById('nb-' + x).classList.toggle('active', x === 'list');
      });
      render();
      setTimeout(() => { renderAlertList(); }, 0);
    }
  } else {
    const ref = getNextRef();
    const newAlert = {
      id:           genId(),
      ref,
      airline:      fAirline,
      airname,
      rate,
      sellRate,
      type:         fType,
      origin,
      dest,
      flag,
      miles,
      taxes,
      mkt,
      pix:          finalPix,
      direct,
      dOut,
      dIn,
      link,
      paymentMode:  fPayment,
      avistaBase,
      avistaLucro,
      pixDesconto,
      semJuros,
      semJurosParc,
      boleto,

      ts:           Date.now(),

    saveAlerts(alerts);
    showToast(`Alerta ${ref} criado!`);
    resetFormState();
    setPage('list');
    setTimeout(() => { renderAlertList(); }, 0);
  }
}

function initBackup() {
  const fi = document.getElementById('file-input');
  fi.value = '';
  fi.addEventListener('change', handleFileImport);
}

function exportData() {
  const alerts   = loadAlerts();
  const packages = loadPackages();
  const data = {
    version: 3,
    at: new Date().toISOString(),
    alerts,
    packages,
  };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const filename = `vck-alertas-${new Date().toISOString().slice(0,10)}.json`;

  if (navigator.share && navigator.canShare) {
    try {
      const file = new File([blob], filename, { type: 'application/json' });
      if (navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file], title: 'VCK Alertas' }).catch(() => downloadFile(url, filename));
        return;
      }
    } catch {}
  }
  downloadFile(url, filename);
}

function downloadFile(url, filename) {
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Exportado!');
}

function handleFileImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      const incomingAlerts = extractAlerts(data);
      const incomingPkgs   = Array.isArray(data.packages) ? data.packages : [];
      const total = incomingAlerts.length + incomingPkgs.length;
      if (!total) { showToast('Nenhum dado encontrado'); return; }
      const desc = [
        incomingAlerts.length ? `${incomingAlerts.length} alerta${incomingAlerts.length !== 1 ? 's' : ''}` : null,
        incomingPkgs.length   ? `${incomingPkgs.length} pacote${incomingPkgs.length !== 1 ? 's' : ''}` : null,
      ].filter(Boolean).join(' e ');
      showDialog(
        'Importar dados',
        `${desc} encontrado${total !== 1 ? 's' : ''}. Como deseja importar?`,
        [
          { label: 'Substituir tudo', cls: 'btn-red',   action: () => importReplace(incomingAlerts, incomingPkgs) },
          { label: 'Mesclar',         cls: 'btn-gold',  action: () => importMerge(incomingAlerts, incomingPkgs)   },
          { label: 'Cancelar',        cls: 'btn-ghost'  },
        ]
      );
    } catch {
      showToast('Arquivo invalido');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function extractAlerts(data) {
  // v3 format
  if (Array.isArray(data.alerts)) {
    return data.alerts.map(migrateAlert);
  }
  // Array directly
  if (Array.isArray(data)) {
    return data.map(migrateAlert);
  }
  return [];
}

function migrateAlert(a) {
  // Old format: has 'dest' but no 'origin'
  if (a.dest && !a.origin) {
    return {
      ...a,
      origin: a.from || '',
      dest:   a.dest,
      id:     a.id || genId(),
      ts:     a.ts || Date.now(),
    };
  }
  return { id: genId(), ts: Date.now(), ...a };
}

function importReplace(alerts, packages) {
  saveAlerts(alerts);
  savePackages(packages);
  const parts = [
    alerts.length   ? `${alerts.length} alerta${alerts.length !== 1 ? 's' : ''}`     : null,
    packages.length ? `${packages.length} pacote${packages.length !== 1 ? 's' : ''}` : null,
  ].filter(Boolean).join(' e ');
  showToast(`Importado: ${parts}`);
  render();
}

function importMerge(incomingAlerts, incomingPkgs) {
  const existAlerts = loadAlerts();
  const existIds = new Set(existAlerts.map(a => a.id));
  const toAddAlerts = incomingAlerts.filter(a => !existIds.has(a.id));
  saveAlerts([...existAlerts, ...toAddAlerts]);

  const existPkgs = loadPackages();
  const existPkgIds = new Set(existPkgs.map(p => p.id));
  const toAddPkgs = incomingPkgs.filter(p => !existPkgIds.has(p.id));
  savePackages([...existPkgs, ...toAddPkgs]);

  const parts = [
    toAddAlerts.length ? `${toAddAlerts.length} alerta${toAddAlerts.length !== 1 ? 's' : ''}` : null,
    toAddPkgs.length   ? `${toAddPkgs.length} pacote${toAddPkgs.length !== 1 ? 's' : ''}`     : null,
  ].filter(Boolean).join(' e ');
  showToast(parts ? `Mesclado: ${parts}` : 'Nada novo para mesclar');
  render();
}

// Converte YYYY-MM-DD → DD/MM/YYYY e vice-versa
function isoToBr(iso) { if (!iso||!iso.includes('-')) return iso||''; const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; }
function brToIso(br)  { if (!br||!br.includes('/')) return br||'';   const [d,m,y]=br.split('/');  return `${y}-${m}-${d}`; }

function calcNoites(dOut, dIn) {
  if (!dOut || !dIn) return 0;
  const parse = s => s.includes('-') ? new Date(s) : (() => { const [d,m,y]=s.split('/').map(Number); return new Date(y,m-1,d); })();
  const diff = Math.round((parse(dIn) - parse(dOut)) / 86400000);
  return diff > 0 ? diff : 0;
}
function pkgGetNum(id) {
  const el = document.getElementById(id); if (!el) return 0;
  const raw = el.value.trim();
  let norm;
  if (raw.includes(',')) { norm = raw.replace(/\./g,'').replace(',','.'); }
  else { const dots=(raw.match(/\./g)||[]).length; norm = (dots>1||(dots===1&&raw.split('.')[1].length===3)) ? raw.replace(/\./g,'') : raw; }
  const v = parseFloat(norm); return isNaN(v) ? 0 : v;
}

// ─────────────────────────────────────────────
function buildPackageWhatsApp(pkg) {
  const noites = pkg.noites || 0;
  const saindoDe = pkg.origin ? ` saindo de ${pkg.origin}` : '';
  const vooDir   = pkg.direct ? ' | Voo Direto' : '';
  let txt = `*${pkg.destino} — ${noites} noite${noites !== 1 ? 's' : ''}${saindoDe}${vooDir}*`;

  // Linha de itens
  const ITEM_KEYS = ['aereo','hotel','transfer','seguro','ingresso','extra'];
  const labels = ITEM_KEYS
    .filter(k => pkg['i_' + k] && pkg['l_' + k])
    .map(k => pkg['l_' + k]);
  if (labels.length > 0) txt += `\n\n${labels.join(' + ')}. Tudo incluso.`;

  // Preço base
  const pessoasLabel = (pkg.numPessoas || 1) === 2 ? 'por casal' : 'por pessoa';
  txt += `\n\n*${brl(pkg.valor)} ${pessoasLabel}*`;

  // Linhas de pagamento
  const payLines = [];
  const pixVal = (pkg.pixDesconto > 0) ? pkg.pixDesconto : pkg.valor;
  payLines.push(`*Pix:* ${brl(pixVal)} à vista`);

  const nParc = pkg.semJurosParc || 12;
  if (pkg.semJuros) {
    payLines.push(`*Cartão:* ${nParc}x de ${brl(pkg.valor / nParc)} sem juros`);
  } else {
    const fee = INST_FEES[nParc] || INST_FEES[10] || 0;
    const total = pkg.valor * (1 + fee / 100);
    payLines.push(`*Cartão:* ${nParc}x de ${brl(total / nParc)}`);
  }
  if (pkg.boleto) {
    payLines.push(`*Boleto:* 1+9 de ${brl(pkg.valor / 10)}`);
  }
  txt += '\n\n' + payLines.join('\n');

  txt += `\n\nVagas limitadas. Me chama no privado com a *REF: ${pkg.ref}*.`;
  txt += `\n\n_VoeComKennedy_`;
  return txt;
}

  const el   = document.getElementById('pkg-noites-display');
  if (el) el.textContent = n > 0 ? `${n} noite${n>1?'s':''}` : '';
}
function selectPkgNP(n) {
  pkgNumPessoas = n;
  document.querySelectorAll('.pkg-np-btn').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.np) === n);
  });
  updatePkgLucro();
}
function updatePkgLucro() {
  const valor = pkgGetNum('pkg-valor');
  const custo = pkgGetNum('pkg-custo');
  const el = document.getElementById('pkg-lucro-display');
  if (!el) return;
  if (!custo || !valor) { el.textContent = ''; return; }
  const lucro = valor - custo;
  const pct   = custo > 0 ? ((lucro / custo) * 100).toFixed(1) : '—';
  el.style.color = lucro >= 0 ? 'var(--green)' : 'var(--red)';
  el.textContent = `Lucro: ${brl(lucro)} (${pct}%)`;
}
function selectPkgFornecedor(val) {
  pkgFornecedor = (pkgFornecedor === val) ? '' : val;
  document.querySelectorAll('.pkg-forn-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.forn === pkgFornecedor);
  });
}
function togglePkgItem(key) {

function initPkgForm() {
  // Sempre configurar autocomplete
  setupAirportAutocomplete('pkg-origin');
  setupAirportAutocomplete('pkg-dest');

  if (pkgEditingId) {
    const pkgs = loadPackages();
    const p = pkgs.find(x => x.id === pkgEditingId);
    if (p) {
      setVal('pkg-origin',     p.origin || '');
      setVal('pkg-dest',       p.dest   || '');

      setVal('pkg-din',  brToIso(p.dIn));
      setVal('pkg-valor',  p.valor);
      setVal('pkg-pix',   p.pixDesconto||'');
      setVal('pkg-custo', p.custo||'');
      pkgNumPessoas = p.numPessoas || 1;

        b.classList.toggle('selected', parseInt(b.dataset.np) === pkgNumPessoas);

      updatePkgLucro();
      setVal('pkg-semjurosparc', p.semJurosParc);
      setVal('pkg-link',       p.link);

      if (sjEl)  { sjEl.checked = p.semJuros; pkgSemJuros = p.semJuros; }
      const blEl  = document.getElementById('pkg-boleto');
      if (blEl)  { blEl.checked = p.boleto;   pkgBoleto = p.boleto; }
      const dirEl = document.getElementById('pkg-direct');
      if (dirEl) { dirEl.checked = !!p.direct; }
      // Fornecedor
      pkgFornecedor = p.fornecedor || '';
      document.querySelectorAll('.pkg-forn-btn').forEach(b => {
        b.classList.toggle('selected', b.dataset.forn === pkgFornecedor);
      });
      const ITEM_KEYS = ['aereo','hotel','transfer','seguro','ingresso','extra'];
      ITEM_KEYS.forEach(k => {
        pkgItems[k] = { active: !!p['i_'+k], label: p['l_'+k] || pkgItems[k].label };
        const chk  = document.getElementById('pkg-chk-'+k);
        const body = document.getElementById('pkg-body-'+k);
        const lbl  = document.getElementById('pkg-lbl-'+k);
        const inp  = document.getElementById('pkg-label-'+k);
        if (chk)  chk.checked = pkgItems[k].active;
        if (body) body.style.display = pkgItems[k].active ? '' : 'none';
        if (lbl)  lbl.style.color = pkgItems[k].active ? 'var(--gold)' : 'var(--gray-2)';
        if (inp)  inp.value = pkgItems[k].label;
      });
      updatePkgNoites();
      pkgRegiao    = p.regiao    || '';
      pkgSchedTime = p.schedTime || '';
      if (pkgRegiao) selectRegiao(pkgRegiao, 'pkg');
      const pkgStEl = document.getElementById('pkg-schedtime');
      if (pkgStEl && pkgSchedTime) pkgStEl.value = pkgSchedTime;
    }
  }
  // Wire auto-detect de regiao pela origem do pacote
  const pkgOriginEl = document.getElementById('pkg-origin');
  if (pkgOriginEl) {
    pkgOriginEl.addEventListener('blur', () => {
      if (!pkgRegiao) autoDetectRegiao(pkgOriginEl.value, 'pkg');
    });
  }
}
function savePkg() {
  const destino = (document.getElementById('pkg-destino')?.value||'').trim();
