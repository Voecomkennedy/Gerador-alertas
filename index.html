  const origin  = (document.getElementById('pkg-origin')?.value||'').trim();
  const dest    = (document.getElementById('pkg-dest')?.value||'').trim();
  const direct  = document.getElementById('pkg-direct')?.checked || false;
  // Datas: type="date" retorna YYYY-MM-DD → armazenar em DD/MM/YYYY
  const dOutIso = document.getElementById('pkg-dout')?.value || '';
  const dInIso  = document.getElementById('pkg-din')?.value  || '';
  const dOut    = isoToBr(dOutIso);
  const dIn     = isoToBr(dInIso);
  const noites  = calcNoites(dOutIso, dInIso);
  const valor      = pkgGetNum('pkg-valor');
  const numPessoas = pkgNumPessoas;
  const pixDesconto= pkgGetNum('pkg-pix');
  const custo      = pkgGetNum('pkg-custo');
  const semJuros   = document.getElementById('pkg-semjuros')?.checked || false;
  const semJurosParc = parseInt(document.getElementById('pkg-semjurosparc')?.value)||12;
  const boleto     = document.getElementById('pkg-boleto')?.checked || false;
  const link       = sanitizeLink(document.getElementById('pkg-link')?.value||'');
  const regiao     = pkgRegiao;
  const schedTime  = (document.getElementById('pkg-schedtime')?.value || '').trim();
  const ITEM_KEYS  = ['aereo','hotel','transfer','seguro','ingresso','extra'];

  const pkg = {
    id: pkgEditingId || ('p' + Date.now()),
    ref: pkgEditingId
      ? loadPackages().find(x=>x.id===pkgEditingId)?.ref || getNextRef()
      : getNextRef(),
    destino, origin, dest, direct, dOut, dIn, noites,
    fornecedor: pkgFornecedor,
    valor, numPessoas, pixDesconto, custo, semJuros, semJurosParc, boleto, link,
    regiao, schedTime,
    ts: Date.now(),
  };
  ITEM_KEYS.forEach(k => {
    const inp = document.getElementById('pkg-label-'+k);
    pkg['i_'+k] = pkgItems[k].active;
    pkg['l_'+k] = inp ? inp.value.trim() : pkgItems[k].label;
  });

  let pkgs = loadPackages();
  if (pkgEditingId) {
    pkgs = pkgs.map(x => x.id === pkgEditingId ? pkg : x);
    showToast('Pacote atualizado');
  } else {
    pkgs.unshift(pkg);
    showToast('Pacote salvo!');
  }
  savePackages(pkgs);
  pkgEditingId = null;
  resetPkgState();
  currentPage = 'pacotes';
  pkgCurrentDetail = pkg;
  ['list','new','pacotes','backup'].forEach(x => {
    const el = document.getElementById('nb-'+x); if(el) el.classList.toggle('active', x==='pacotes');
  });
  render();
}
function backFromPkgNew() {
  pkgEditingId = null; resetPkgState();
  currentPage = 'pacotes'; pkgCurrentDetail = null;
  ['list','new','pacotes','backup'].forEach(x => {
    const el = document.getElementById('nb-'+x); if(el) el.classList.toggle('active', x==='pacotes');
  });
  render();
}

// ─────────────────────────────────────────────
// PACOTES — DETAIL PAGE
// ─────────────────────────────────────────────
function openPkgDetail(id) {
  const pkgs = loadPackages();
  pkgCurrentDetail = pkgs.find(p => p.id === id) || null;
  if (!pkgCurrentDetail) return;
  currentPage = 'pacotes';
  render();
}
function renderPkgDetail(pkg) {
  const link    = sanitizeLink(pkg.link||'');
  const linkBtn = link
    ? `<a href="${link}" target="_blank" rel="noopener noreferrer" class="btn-link-full">ABRIR FORNECEDOR</a>`
    : `<button class="btn btn-ghost" style="cursor:not-allowed;opacity:0.5">SEM LINK CADASTRADO</button>`;

  const waCopy = buildPackageWhatsApp(pkg);
  window._pkgCopy = { wa: waCopy };

  // Items list
  const ITEM_DEFS = [
    {key:'aereo',icon:'✈️'},{key:'hotel',icon:'🏨'},{key:'transfer',icon:'🚌'},
    {key:'seguro',icon:'🛡️'},{key:'ingresso',icon:'🎡'},{key:'extra',icon:'➕'},
  ];
  const activeItems = ITEM_DEFS.filter(it => pkg['i_'+it.key] && pkg['l_'+it.key]);
  const itemsHtml = activeItems.map(it =>
    `<div class="fin-row"><span>${it.icon}</span><span>${escHtml(pkg['l_'+it.key])}</span></div>`
  ).join('');

  // Payment summary
  const nParc = pkg.semJurosParc || 12;
  const pixVal = pkg.pixDesconto > 0 ? pkg.pixDesconto : pkg.valor;
  let cartaoDesc;
  if (pkg.semJuros) {
    cartaoDesc = `${nParc}x de ${brl(pkg.valor/nParc)} sem juros`;
  } else {
    const fee = INST_FEES[nParc]||INST_FEES[10]||0;
    cartaoDesc = `${nParc}x de ${brl(pkg.valor*(1+fee/100)/nParc)}`;
  }

  const lucro = pkg.custo ? pkg.valor - pkg.custo : 0;
  const lucroPct = pkg.custo > 0 ? ((lucro / pkg.custo) * 100).toFixed(1) : '—';

  return `
    <div class="page-shell">
      <button id="back-btn" onclick="pkgCurrentDetail=null;render()">&#8592; Voltar</button>

      <div class="detail-layout">
        <div class="detail-main">
          <div class="detail-header">
            <div class="detail-header-top">
              <div>
                <div class="detail-ref">REF: ${pkg.ref}${pkg.fornecedor ? ` · ${pkg.fornecedor}` : ''}</div>
                <div class="detail-route">${pkg.destino}${pkg.direct ? ' · Voo Direto' : ''}</div>
                <div class="detail-airline">${pkg.noites||0} noites · ${pkg.origin||'—'} &rarr; ${pkg.dest||'—'}</div>
                ${pkg.ts ? `<div class="detail-ts">Gerado em ${formatTs(pkg.ts)}</div>` : ''}
              </div>
              <button class="detail-edit-btn" onclick="editPkg('${pkg.id}')">Editar</button>
            </div>

            <div class="detail-chip-row">
              <span class="badge badge-intl">PKG</span>
              ${pkg.direct ? '<span class="detail-chip positive">Voo direto</span>' : ''}
              ${pkg.boleto ? '<span class="detail-chip warn">Boleto disponível</span>' : ''}
              <span class="detail-chip default">${(pkg.numPessoas||1)===2 ? 'Casal' : '1 pessoa'}</span>
            </div>

            <div class="detail-pix">${brl(pkg.valor)}<span style="font-size:14px;font-weight:500;color:var(--gray-1)"> ${(pkg.numPessoas||1)===2?'/ casal':'/ pessoa'}</span></div>
            <div class="detail-inst">${cartaoDesc}</div>

            <div class="detail-highlight-grid">
              <div class="detail-metric">
                <span class="detail-metric-label">Preço principal</span>
                <span class="detail-metric-value">${brl(pkg.valor)}</span>
              </div>
              <div class="detail-metric ${pkg.pixDesconto > 0 ? 'positive' : 'warn'}">
                <span class="detail-metric-label">Pix</span>
                <span class="detail-metric-value">${brl(pixVal)}</span>
              </div>
              <div class="detail-metric ${pkg.custo ? (lucro >= 0 ? 'positive' : 'risk') : 'warn'}">
                <span class="detail-metric-label">${pkg.custo ? 'Margem interna' : 'Sem custo'}</span>
                <span class="detail-metric-value">${pkg.custo ? `${brl(lucro)} (${lucroPct}%)` : '—'}</span>
              </div>
            </div>
          </div>

          <div class="financial-box">
            <div class="fin-title">Itens inclusos</div>
            ${itemsHtml || '<div style="color:var(--gray-2);font-size:13px">Nenhum item cadastrado</div>'}
          </div>

          <div class="financial-box">
            <div class="fin-title">Pagamento</div>
            <div class="fin-row"><span style="color:var(--gray-1)">Pix</span><span style="color:var(--gold);font-weight:700">${brl(pixVal)}</span></div>
            <div class="fin-row"><span style="color:var(--gray-1)">Cartão</span><span>${cartaoDesc}</span></div>
            ${pkg.boleto ? `<div class="fin-row"><span style="color:var(--gray-1)">Boleto</span><span>1+9 de ${brl(pkg.valor/10)}</span></div>` : ''}
          </div>

          ${pkg.custo ? `
          <div class="financial-box" style="border:1.5px dashed var(--border)">
            <div class="fin-title" style="color:var(--gray-2)">Interno</div>
            <div class="fin-row"><span style="color:var(--gray-2)">Custo</span><span style="color:var(--gray-2)">${brl(pkg.custo)}</span></div>
            <div class="fin-row"><span style="color:var(--gray-2)">Lucro</span><span style="color:${lucro>=0?'var(--green)':'var(--red)'};font-weight:700">${brl(lucro)} (${lucroPct}%)</span></div>
          </div>` : ''}

          ${(pkg.dOut||pkg.dIn) ? `
          <div class="financial-box">
            <div class="fin-title">Período</div>
            <div class="fin-row"><span style="color:var(--gray-1)">Ida</span><span>${pkg.dOut||'—'}</span></div>
            <div class="fin-row"><span style="color:var(--gray-1)">Volta</span><span>${pkg.dIn||'—'}</span></div>
          </div>` : ''}
        </div>

        <aside class="detail-side">
          <div class="section-card sticky-panel">
            <div class="section-eyebrow">Ações rápidas</div>
            <div class="support-text">Use o link do fornecedor e a copy pronta para acelerar distribuição com o mesmo padrão do restante do sistema.</div>
            ${linkBtn}
          </div>

          <div class="copy-block">
            <div class="copy-block-top">
              <div class="copy-block-title">WhatsApp</div>
              <button class="btn-sm btn-gold" onclick="copyText(window._pkgCopy.wa, this)">Copiar</button>
            </div>
            <div class="copy-text">${escHtml(waCopy)}</div>
          </div>

          <button class="btn btn-red" onclick="confirmDeletePkg('${pkg.id}')">Excluir pacote</button>
        </aside>
      </div>
    </div>
  `;
}
function editPkg(id) {
  pkgEditingId = id; resetPkgState();
  currentPage = 'pacote-new';
  pkgCurrentDetail = null;
  ['list','new','pacotes','backup'].forEach(x => {
    const el = document.getElementById('nb-'+x); if(el) el.classList.toggle('active', x==='pacotes');
  });
  render();
}
function confirmDeletePkg(id) {
  showDialog(
    'Excluir pacote',
    'Isso vai remover o pacote permanentemente.',
    [
      { label: 'Excluir', cls: 'btn-red', action: () => deletePkg(id) },
      { label: 'Cancelar', cls: 'btn-ghost' },
    ]
  );
}
function deletePkg(id) {
  let pkgs = loadPackages().filter(p => p.id !== id);
  savePackages(pkgs);
  pkgCurrentDetail = null;
  showToast('Pacote excluído');
  currentPage = 'pacotes';
  render();
}

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  render();
  // Render alert list after list page is painted
  setTimeout(() => {
    if (currentPage === 'list' && !currentDetail) {
      const inp = document.getElementById('search-input');
      if (inp) {
        inp.addEventListener('input', e => {
          searchQuery = e.target.value;
          renderAlertList();
        });
      }
      renderAlertList();
    }
  }, 0);
});
</script>
</body>
</html>
